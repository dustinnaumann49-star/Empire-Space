<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Lord Kampf-Simulator - Detailliert</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .armies-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .army {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            flex: 1;
            min-width: 400px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .army h2 {
            text-align: center;
            margin-top: 0;
        }
        .attacker h2 { color: #ff6b6b; }
        .defender h2 { color: #4ecdc4; }
        
        .row {
            background: rgba(30,30,50,0.8);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #ffd700;
        }
        .row-title {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .row-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        select, input, button {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
        }
        select {
            background: #2c3e50;
            color: white;
            cursor: pointer;
        }
        input {
            background: #2c3e50;
            color: white;
            width: 90px;
        }
        .fight-section {
            text-align: center;
            margin: 25px 0;
        }
        .fight-btn {
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 10px;
        }
        .fight-btn:hover {
            transform: scale(1.02);
        }
        .reset-btn {
            background: #2c3e50;
            color: white;
            padding: 6px 18px;
            cursor: pointer;
        }
        .report {
            background: #0a0a1a;
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
            border: 1px solid #ffd700;
        }
        .report h3 {
            color: #ffd700;
            margin-top: 0;
        }
        .report-content {
            background: #050510;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-height: 550px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .type-carni { color: #ff6b6b; }
        .type-herbi { color: #7bed9f; }
        .type-omni { color: #ffd700; }
        
        .detail-row {
            background: rgba(0,0,0,0.3);
            margin: 5px 0;
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐺 Beast Lord Kampf-Simulator ⚔️</h1>
    <div class="subtitle">Detaillierte Kampfberichte | Bestien-Schaden | Alpha-Abhängigkeit</div>

    <div class="armies-container">
        <div class="army attacker">
            <h2>⚔️ ANGREIFER ⚔️</h2>
            <div id="attacker-rows"></div>
        </div>
        <div class="army defender">
            <h2>🛡️ VERTEIDIGER 🛡️</h2>
            <div id="defender-rows"></div>
        </div>
    </div>

    <div class="fight-section">
        <button class="fight-btn" id="fightBtn">🔥 KAMPF STARTEN 🔥</button>
        <button class="reset-btn" id="resetBtn">↺ Standard</button>
    </div>

    <div class="report">
        <h3>📜 KAMPFBERICHT</h3>
        <div class="report-content" id="report-content">
            Klicke auf "KAMPF STARTEN"
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== BESTIEN ==========
        const BEASTS = {
            hoelhenhyaene: { name: "Höhlenhyäne", type: "carni", attack: 151, defense: 63, hp: 20 },
            langhornbison: { name: "Langhornbison", type: "herbi", attack: 99, defense: 102, hp: 28 },
            gigantopithecus: { name: "Gigantopithecus", type: "omni", attack: 121, defense: 78, hp: 24 }
        };

        // ========== ALPHAS ==========
        const ALPHAS = {
            smilodon: { name: "Smilodon", type: "carni", skillChance: 0.8, skillMulti: 2.0, skillName: "Tödlicher Comboschlag" },
            beutelloewe: { name: "Beutellöwe", type: "carni", skillChance: 0.6, skillMulti: 2.15, skillName: "Nachstoß" },
            hyaenodon: { name: "Hyaenodon", type: "carni", skillChance: 0.5, skillMulti: 1.8, skillName: "Erstschlag" },
            amerikanischerGepard: { name: "Gepard", type: "carni", skillChance: 0.5, skillMulti: 1.7, skillName: "Blitzangriff" },
            metridiochoerus: { name: "Metridiochoerus", type: "omni", skillChance: 0.6, skillMulti: 2.0, skillName: "Schwingenschlag" },
            dinopithecus: { name: "Dinopithecus", type: "omni", skillChance: 0.7, skillMulti: 2.2, skillName: "Echter Schaden" },
            elefantenvogel: { name: "Elefantenvogel", type: "omni", skillChance: 0.5, skillMulti: 1.8, skillName: "Reaktiver Schlag" },
            kurznasenbaer: { name: "Kurznasenbär", type: "omni", skillChance: 0.7, skillMulti: 2.5, skillName: "Ausnutzen" },
            riesenSivatherium: { name: "Sivatherium", type: "herbi", skillChance: 0.5, skillMulti: 1.6, skillName: "Verwirrender Tritt" },
            meiolanja: { name: "Meiolanja", type: "herbi", skillChance: 0.6, skillMulti: 1.5, skillName: "Gegenschlag" },
            mammut: { name: "Mammut", type: "herbi", skillChance: 0.5, skillMulti: 1.7, skillName: "Gegenangriff" },
            megatherium: { name: "Megatherium", type: "herbi", skillChance: 0.6, skillMulti: 2.0, skillName: "Fokussierter Schlag" }
        };

        // ========== STANDARD AUFSTELLUNG ==========
        let defaultAttacker = [
            { alpha: "smilodon", beast: "hoelhenhyaene", count: 100000 },
            { alpha: "beutelloewe", beast: "hoelhenhyaene", count: 80000 },
            { alpha: "hyaenodon", beast: "hoelhenhyaene", count: 90000 }
        ];
        
        let defaultDefender = [
            { alpha: "riesenSivatherium", beast: "langhornbison", count: 120000 },
            { alpha: "mammut", beast: "langhornbison", count: 110000 },
            { alpha: "megatherium", beast: "langhornbison", count: 100000 }
        ];

        let attackerRows = JSON.parse(JSON.stringify(defaultAttacker));
        let defenderRows = JSON.parse(JSON.stringify(defaultDefender));
        
        let logEntries = [];
        
        // Statistiken für Kampfbericht
        let roundStats = {
            attacker: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 },
            defender: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 }
        };
        
        let rowStats = {
            attacker: [],
            defender: []
        };

        function addLog(msg, type, indent = 0) {
            const indentStr = '  '.repeat(indent);
            logEntries.push({ msg: indentStr + msg, type: type || 'info' });
            console.log(msg);
        }

        function clearLog() {
            logEntries = [];
            roundStats = {
                attacker: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 },
                defender: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 }
            };
        }

        function updateUI() {
            const container = document.getElementById('report-content');
            if (!container) return;
            
            let html = '';
            for (let entry of logEntries) {
                let color = '#ccc';
                if (entry.type === 'damage') color = '#ff8888';
                if (entry.type === 'skill') color = '#88ff88';
                if (entry.type === 'heal') color = '#8888ff';
                if (entry.type === 'round') color = '#ffcc66';
                if (entry.type === 'victory') color = '#ffaa44';
                if (entry.type === 'info') color = '#aaa';
                if (entry.type === 'stat') color = '#ffaa88';
                html += `<div style="color: ${color}; margin: 2px 0; white-space: pre-wrap;">${escapeHtml(entry.msg)}</div>`;
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Schadensberechnung mit Bestien-Anzahl
        function calcDamage(attacker, defender, multi, isSkill = false) {
            // Bestien machen den Hauptschaden
            let beastDamage = (attacker.beastAttack * (attacker.count / 100)) * multi;
            
            // Alpha-Bonus (abhängig von der Bestien-Anzahl)
            let alphaBonus = 1 + (attacker.count / 500000);
            if (alphaBonus > 1.5) alphaBonus = 1.5;
            
            let totalDamage = beastDamage * alphaBonus;
            
            // Verteidigung reduzieren
            let defReduction = defender.beastDefense / 400;
            if (defReduction > 0.6) defReduction = 0.6;
            totalDamage = totalDamage * (1 - defReduction);
            
            // Typ-Vorteil
            let typeBonus = 1.0;
            if (attacker.alphaType === 'carni' && defender.alphaType === 'herbi') typeBonus = 1.25;
            if (attacker.alphaType === 'herbi' && defender.alphaType === 'omni') typeBonus = 1.25;
            if (attacker.alphaType === 'omni' && defender.alphaType === 'carni') typeBonus = 1.25;
            totalDamage = totalDamage * typeBonus;
            
            // Zufallsfaktor
            totalDamage = totalDamage * (0.85 + Math.random() * 0.3);
            
            // Skills machen mehr Schaden
            if (isSkill) totalDamage = totalDamage * 1.5;
            
            return Math.max(1, Math.floor(totalDamage));
        }
        
        // Bestien-Zahl aus HP berechnen
        function updateCountFromHp(unit) {
            unit.count = Math.floor(unit.hp / unit.beastHp);
            if (unit.count < 0) unit.count = 0;
            return unit.count;
        }

        // Kampf-Funktion mit detailliertem Bericht
        function startFight() {
            clearLog();
            addLog("═══════════════════════════════════════════════════", "victory");
            addLog("⚔️ KAMPF BEGINNT ⚔️", "victory");
            addLog("═══════════════════════════════════════════════════", "victory");
            
            // Einheiten erstellen
            let attacker = attackerRows.map((r, idx) => ({
                id: idx,
                rowNum: idx + 1,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                alphaSkillChance: ALPHAS[r.alpha].skillChance,
                alphaSkillMulti: ALPHAS[r.alpha].skillMulti,
                alphaSkillName: ALPHAS[r.alpha].skillName,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                beastAttack: BEASTS[r.beast].attack,
                beastDefense: BEASTS[r.beast].defense,
                beastHp: BEASTS[r.beast].hp,
                beastType: BEASTS[r.beast].type,
                count: r.count,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                isAlive: true,
                // Stats für Bericht
                totalDamageDealt: 0,
                skillDamageDealt: 0,
                skillUses: 0,
                kills: 0
            }));
            
            let defender = defenderRows.map((r, idx) => ({
                id: idx,
                rowNum: idx + 1,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                alphaSkillChance: ALPHAS[r.alpha].skillChance,
                alphaSkillMulti: ALPHAS[r.alpha].skillMulti,
                alphaSkillName: ALPHAS[r.alpha].skillName,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                beastAttack: BEASTS[r.beast].attack,
                beastDefense: BEASTS[r.beast].defense,
                beastHp: BEASTS[r.beast].hp,
                beastType: BEASTS[r.beast].type,
                count: r.count,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                isAlive: true,
                totalDamageDealt: 0,
                skillDamageDealt: 0,
                skillUses: 0,
                kills: 0
            }));
            
            // Start-Übersicht
            addLog("\n📊 AUFSTELLUNG:", "info");
            addLog("┌─────────────────────────────────────────────────┐", "info");
            for (let a of attacker) {
                addLog(`│ Angreifer Reihe ${a.rowNum}: ${a.alphaName} + ${a.count.toLocaleString()} ${a.beastName} (${a.beastAttack} Angriff / ${a.beastDefense} Def)`, "info");
            }
            addLog("├─────────────────────────────────────────────────┤", "info");
            for (let d of defender) {
                addLog(`│ Verteidiger Reihe ${d.rowNum}: ${d.alphaName} + ${d.count.toLocaleString()} ${d.beastName} (${d.beastAttack} Angriff / ${d.beastDefense} Def)`, "info");
            }
            addLog("└─────────────────────────────────────────────────┘", "info");
            
            let round = 1;
            let maxRounds = 30;
            let winner = null;
            let roundDetails = [];
            
            while (round <= maxRounds && winner === null) {
                addLog(`\n╔═══════════════════════════════════════════════════╗`, "round");
                addLog(`║                    RUNDE ${round}                     ║`, "round");
                addLog(`╚═══════════════════════════════════════════════════╝`, "round");
                
                // Aktuelle Stärke anzeigen
                addLog(`\n📈 Aktuelle Truppenstärke:`, "info");
                for (let a of attacker) {
                    let percent = ((a.hp / a.maxHp) * 100).toFixed(1);
                    addLog(`   Angreifer R${a.rowNum}: ${Math.floor(a.hp).toLocaleString()} / ${a.maxHp.toLocaleString()} HP (${percent}%) - ${a.count.toLocaleString()} Bestien`, "info");
                }
                for (let d of defender) {
                    let percent = ((d.hp / d.maxHp) * 100).toFixed(1);
                    addLog(`   Verteidiger R${d.rowNum}: ${Math.floor(d.hp).toLocaleString()} / ${d.maxHp.toLocaleString()} HP (${percent}%) - ${d.count.toLocaleString()} Bestien`, "info");
                }
                
                addLog(`\n⚔️ ANGREIFER greifen an:`, "damage");
                
                // Angreifer greifen an
                for (let a of attacker) {
                    if (!a.isAlive || a.count <= 0) continue;
                    
                    // Finde lebenden Verteidiger (Reihenfolge: Reihe 1 zuerst)
                    let target = defender.find(d => d.isAlive && d.count > 0);
                    if (!target) break;
                    
                    let isSkill = Math.random() < a.alphaSkillChance;
                    let multi = isSkill ? a.alphaSkillMulti : 1.0;
                    let damage = calcDamage(a, target, multi, isSkill);
                    
                    // Schaden anwenden
                    let oldTargetHp = target.hp;
                    target.hp -= damage;
                    if (target.hp < 0) target.hp = 0;
                    
                    // Bestien-Zahl aktualisieren
                    let oldTargetCount = target.count;
                    target.count = Math.floor(target.hp / target.beastHp);
                    if (target.count < 0) target.count = 0;
                    
                    // Stats aktualisieren
                    a.totalDamageDealt += damage;
                    if (isSkill) {
                        a.skillDamageDealt += damage;
                        a.skillUses++;
                        roundStats.attacker.skillDamage += damage;
                        roundStats.attacker.skillUses++;
                        addLog(`   ✨ Reihe ${a.rowNum} (${a.alphaName}): ${a.alphaSkillName} - ${damage.toLocaleString()} Schaden auf Reihe ${target.rowNum} (${target.alphaName})`, "skill", 1);
                    } else {
                        a.skillDamageDealt += 0;
                        roundStats.attacker.normalDamage += damage;
                        addLog(`   ⚔️ Reihe ${a.rowNum} (${a.alphaName}): Normaler Angriff - ${damage.toLocaleString()} Schaden auf Reihe ${target.rowNum} (${target.alphaName})`, "damage", 1);
                    }
                    roundStats.attacker.totalDamage += damage;
                    
                    // Todesnachricht
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        a.kills++;
                        addLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde besiegt!`, "damage", 1);
                    } else {
                        let lostCount = oldTargetCount - target.count;
                        if (lostCount > 0) {
                            addLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName} (${target.count.toLocaleString()} verbleiben)`, "damage", 1);
                        }
                    }
                }
                
                // Prüfe Sieg
                if (!defender.some(d => d.isAlive && d.count > 0)) {
                    winner = "ANGREIFER";
                    break;
                }
                
                addLog(`\n🛡️ VERTEIDIGER greifen an:`, "damage");
                
                // Verteidiger greifen an
                for (let d of defender) {
                    if (!d.isAlive || d.count <= 0) continue;
                    
                    let target = attacker.find(a => a.isAlive && a.count > 0);
                    if (!target) break;
                    
                    let isSkill = Math.random() < d.alphaSkillChance;
                    let multi = isSkill ? d.alphaSkillMulti : 1.0;
                    let damage = calcDamage(d, target, multi, isSkill);
                    
                    let oldTargetHp = target.hp;
                    target.hp -= damage;
                    if (target.hp < 0) target.hp = 0;
                    
                    let oldTargetCount = target.count;
                    target.count = Math.floor(target.hp / target.beastHp);
                    if (target.count < 0) target.count = 0;
                    
                    d.totalDamageDealt += damage;
                    if (isSkill) {
                        d.skillDamageDealt += damage;
                        d.skillUses++;
                        roundStats.defender.skillDamage += damage;
                        roundStats.defender.skillUses++;
                        addLog(`   ✨ Reihe ${d.rowNum} (${d.alphaName}): ${d.alphaSkillName} - ${damage.toLocaleString()} Schaden auf Reihe ${target.rowNum} (${target.alphaName})`, "skill", 1);
                    } else {
                        roundStats.defender.normalDamage += damage;
                        addLog(`   ⚔️ Reihe ${d.rowNum} (${d.alphaName}): Normaler Angriff - ${damage.toLocaleString()} Schaden auf Reihe ${target.rowNum} (${target.alphaName})`, "damage", 1);
                    }
                    roundStats.defender.totalDamage += damage;
                    
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        d.kills++;
                        addLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde besiegt!`, "damage", 1);
                    } else {
                        let lostCount = oldTargetCount - target.count;
                        if (lostCount > 0) {
                            addLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName} (${target.count.toLocaleString()} verbleiben)`, "damage", 1);
                        }
                    }
                }
                
                // Prüfe Sieg
                if (!attacker.some(a => a.isAlive && a.count > 0)) {
                    winner = "VERTEIDIGER";
                    break;
                }
                
                round++;
            }
            
            // ========== DETAILLIERTER KAMPFBERICHT ==========
            addLog(`\n╔═══════════════════════════════════════════════════╗`, "victory");
            addLog(`║                  KAMPFBERICHT                     ║`, "victory");
            addLog(`╚═══════════════════════════════════════════════════╝`, "victory");
            
            if (winner === null) {
                addLog(`\n⏰ UNENTSCHIEDEN nach ${maxRunden} Runden!`, "victory");
            } else {
                addLog(`\n🏆 SIEGER: ${winner} nach ${round} Runden! 🏆`, "victory");
            }
            
            // Gesamtstatistiken
            addLog(`\n📊 GESAMTSTATISTIK:`, "stat");
            addLog(`┌─────────────────────────────────────────────────┐`, "stat");
            addLog(`│ ANGREIFER:                                      │`, "stat");
            addLog(`│   Gesamtschaden: ${roundStats.attacker.totalDamage.toLocaleString()}`, "stat");
            addLog(`│   Davon Skills: ${roundStats.attacker.skillDamage.toLocaleString()} (${roundStats.attacker.skillUses}×)`, "stat");
            addLog(`│   Normal: ${roundStats.attacker.normalDamage.toLocaleString()}`, "stat");
            addLog(`├─────────────────────────────────────────────────┤`, "stat");
            addLog(`│ VERTEIDIGER:                                    │`, "stat");
            addLog(`│   Gesamtschaden: ${roundStats.defender.totalDamage.toLocaleString()}`, "stat");
            addLog(`│   Davon Skills: ${roundStats.defender.skillDamage.toLocaleString()} (${roundStats.defender.skillUses}×)`, "stat");
            addLog(`│   Normal: ${roundStats.defender.normalDamage.toLocaleString()}`, "stat");
            addLog(`└─────────────────────────────────────────────────┘`, "stat");
            
            // Detaillierte Reihenstatistiken
            addLog(`\n📋 DETAILS NACH REIHEN:`, "stat");
            addLog(`┌─────────────────────────────────────────────────┐`, "stat");
            addLog(`│ ANGREIFER:                                      │`, "stat");
            for (let a of attacker) {
                let survived = a.isAlive ? "✅ Überlebt" : "💀 Besiegt";
                addLog(`│ Reihe ${a.rowNum}: ${a.alphaName} + ${a.beastName}`, "stat");
                addLog(`│   Schaden: ${a.totalDamageDealt.toLocaleString()} (Skills: ${a.skillDamageDealt.toLocaleString()}, ${a.skillUses}×)`, "stat");
                addLog(`│   Kills: ${a.kills} | Status: ${survived}`, "stat");
                addLog(`│   Verbleibende Bestien: ${a.count.toLocaleString()}`, "stat");
                if (a !== attacker[attacker.length-1]) addLog(`├─────────────────────────────────────────────────┤`, "stat");
            }
            addLog(`├─────────────────────────────────────────────────┤`, "stat");
            addLog(`│ VERTEIDIGER:                                    │`, "stat");
            for (let d of defender) {
                let survived = d.isAlive ? "✅ Überlebt" : "💀 Besiegt";
                addLog(`│ Reihe ${d.rowNum}: ${d.alphaName} + ${d.beastName}`, "stat");
                addLog(`│   Schaden: ${d.totalDamageDealt.toLocaleString()} (Skills: ${d.skillDamageDealt.toLocaleString()}, ${d.skillUses}×)`, "stat");
                addLog(`│   Kills: ${d.kills} | Status: ${survived}`, "stat");
                addLog(`│   Verbleibende Bestien: ${d.count.toLocaleString()}`, "stat");
                if (d !== defender[defender.length-1]) addLog(`├─────────────────────────────────────────────────┤`, "stat");
            }
            addLog(`└─────────────────────────────────────────────────┘`, "stat");
            
            addLog(`\n═══════════════════════════════════════════════════`, "victory");
            
            updateUI();
        }
        
        // ========== UI RENDER FUNKTION ==========
        function renderArmy(containerId, rows, isAttacker) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            rows.forEach((row, idx) => {
                const alpha = ALPHAS[row.alpha];
                const beast = BEASTS[row.beast];
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.innerHTML = `
                    <div class="row-title">Reihe ${idx + 1} - ${alpha.name}</div>
                    <div class="row-controls">
                        <select class="alpha-select" data-side="${isAttacker ? 'attacker' : 'defender'}" data-row="${idx}">
                            ${Object.keys(ALPHAS).map(key => `<option value="${key}" ${row.alpha === key ? 'selected' : ''}>${ALPHAS[key].name}</option>`).join('')}
                        </select>
                        <select class="beast-select" data-side="${isAttacker ? 'attacker' : 'defender'}" data-row="${idx}">
                            ${Object.keys(BEASTS).map(key => `<option value="${key}" ${row.beast === key ? 'selected' : ''}>${BEASTS[key].name}</option>`).join('')}
                        </select>
                        <input type="number" class="count-input" data-side="${isAttacker ? 'attacker' : 'defender'}" data-row="${idx}" value="${row.count}" step="1000" min="0">
                    </div>
                `;
                container.appendChild(rowDiv);
            });
        }
        
        function renderAll() {
            renderArmy('attacker-rows', attackerRows, true);
            renderArmy('defender-rows', defenderRows, false);
            attachEvents();
        }
        
        function attachEvents() {
            document.querySelectorAll('.alpha-select').forEach(select => {
                select.onchange = (e) => {
                    const side = e.target.dataset.side;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (side === 'attacker') attackerRows[row].alpha = val;
                    else defenderRows[row].alpha = val;
                };
            });
            
            document.querySelectorAll('.beast-select').forEach(select => {
                select.onchange = (e) => {
                    const side = e.target.dataset.side;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (side === 'attacker') attackerRows[row].beast = val;
                    else defenderRows[row].beast = val;
                };
            });
            
            document.querySelectorAll('.count-input').forEach(input => {
                input.onchange = (e) => {
                    const side = e.target.dataset.side;
                    const row = parseInt(e.target.dataset.row);
                    const val = parseInt(e.target.value) || 0;
                    if (side === 'attacker') attackerRows[row].count = val;
                    else defenderRows[row].count = val;
                };
            });
        }
        
        function resetSetup() {
            attackerRows = JSON.parse(JSON.stringify(defaultAttacker));
            defenderRows = JSON.parse(JSON.stringify(defaultDefender));
            renderAll();
            clearLog();
            addLog("🔁 Aufstellung zurückgesetzt");
            updateUI();
        }
        
        document.getElementById('fightBtn').onclick = () => startFight();
        document.getElementById('resetBtn').onclick = () => resetSetup();
        
        renderAll();
        addLog("✅ Bereit! Klicke auf 'KAMPF STARTEN'");
        updateUI();
    })();
</script>
</body>
</html>
