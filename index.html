<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGame - Expeditionsflotte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(0, 100, 200, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 50%, rgba(100, 0, 200, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 50% 0%, rgba(200, 150, 0, 0.1) 0%, transparent 50%);
            position: relative;
            overflow-x: hidden;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite; animation-delay: var(--delay); }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; background: linear-gradient(180deg, rgba(10, 20, 40, 0.9) 0%, rgba(10, 20, 40, 0.7) 100%); border-bottom: 2px solid rgba(0, 150, 255, 0.3); margin-bottom: 30px; border-radius: 0 0 20px 20px; position: relative; }
        .save-indicator { position: absolute; top: 20px; right: 30px; font-size: 0.85em; color: #44ff44; opacity: 0; transition: opacity 0.3s ease; }
        .save-indicator.visible { opacity: 1; }
        .offline-indicator { position: absolute; top: 50px; right: 30px; font-size: 0.8em; color: #ffaa00; opacity: 0; transition: opacity 0.3s ease; }
        .offline-indicator.visible { opacity: 1; }
        .reset-btn { position: absolute; top: 20px; left: 30px; background: rgba(255, 50, 50, 0.3); border: 1px solid rgba(255, 50, 50, 0.5); color: #ff6666; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 0.8em; transition: all 0.3s ease; }
        .reset-btn:hover { background: rgba(255, 50, 50, 0.5); box-shadow: 0 0 15px rgba(255, 50, 50, 0.3); }
        .sound-toggle { position: absolute; top: 20px; right: 150px; background: rgba(100, 100, 255, 0.3); border: 1px solid rgba(100, 100, 255, 0.5); color: #aaaaff; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 0.8em; transition: all 0.3s ease; }
        .sound-toggle:hover { background: rgba(100, 100, 255, 0.5); box-shadow: 0 0 15px rgba(100, 100, 255, 0.3); }
        h1 { font-size: 3em; background: linear-gradient(135deg, #00b4ff, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: 0 0 30px rgba(0, 100, 255, 0.5); letter-spacing: 3px; }
        .subtitle { color: #6699cc; font-size: 1.1em; letter-spacing: 5px; margin-top: 5px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .panel { background: linear-gradient(135deg, rgba(15, 25, 45, 0.95), rgba(20, 30, 50, 0.9)); border: 1px solid rgba(0, 150, 255, 0.3); border-radius: 15px; padding: 25px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .panel:hover { border-color: rgba(0, 150, 255, 0.6); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 100, 255, 0.1); }
        .panel-title { font-size: 1.2em; font-weight: bold; color: #00b4ff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid rgba(0, 180, 255, 0.3); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .resource-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .resource-item { background: rgba(0, 20, 40, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 15px; text-align: center; transition: all 0.3s ease; }
        .resource-item.metal { border-color: rgba(180, 150, 100, 0.5); }
        .resource-item.crystal { border-color: rgba(100, 200, 180, 0.5); }
        .resource-item.deuterium { border-color: rgba(150, 150, 255, 0.5); }
        .resource-icon { font-size: 2em; margin-bottom: 5px; }
        .resource-value { font-size: 1.3em; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
        .resource-label { font-size: 0.8em; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .ship-build-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .ship-card { background: rgba(0, 15, 30, 0.7); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; padding: 12px; transition: all 0.3s ease; display: flex; align-items: center; gap: 12px; position: relative; }
        .ship-card:hover { border-color: rgba(0, 150, 255, 0.6); background: rgba(0, 30, 60, 0.8); box-shadow: 0 5px 20px rgba(0, 100, 200, 0.2); }
        .ship-card.building { border-color: rgba(255, 200, 0, 0.6); animation: pulse 0.5s ease-in-out infinite; }
        .ship-card.build-blocked { opacity: 0.5; }
        .ship-card.build-blocked .build-btn, .ship-card.build-blocked .build-input { pointer-events: none; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px rgba(255, 200, 0, 0.3); } 50% { box-shadow: 0 0 25px rgba(255, 200, 0, 0.6); } }
        .ship-icon-large { font-size: 2em; min-width: 50px; text-align: center; }
        .ship-info { flex: 1; min-width: 0; }
        .ship-name { font-weight: bold; color: #ddd; font-size: 0.95em; margin-bottom: 3px; }
        .ship-stats { font-size: 0.7em; color: #999; display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
        .ship-cost { font-size: 0.7em; color: #aaa; }
        .ship-build-controls { display: flex; align-items: center; gap: 6px; min-width: 180px; }
        .build-input { width: 60px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 6px; border-radius: 5px; text-align: center; font-size: 0.85em; }
        .build-btn { background: linear-gradient(135deg, #0066cc, #0044aa); color: white; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; white-space: nowrap; }
        .build-btn:hover { background: linear-gradient(135deg, #0088ff, #0055cc); box-shadow: 0 5px 15px rgba(0, 100, 200, 0.4); transform: translateY(-2px); }
        .build-btn:active { transform: scale(0.95); }
        .build-btn:disabled { background: #333; cursor: not-allowed; box-shadow: none; transform: none; }
        .count-badge { background: rgba(0, 150, 255, 0.8); color: white; border-radius: 20px; padding: 3px 8px; font-size: 0.75em; font-weight: bold; display: inline-block; }
        .building-progress { font-size: 0.7em; color: #ffaa00; margin-top: 2px; }
        .upgrade-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .upgrade-item { background: rgba(0, 20, 40, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .upgrade-info { flex: 1; }
        .upgrade-name { font-weight: bold; color: #ddd; font-size: 0.9em; }
        .upgrade-level { font-size: 0.8em; color: #ffaa00; }
        .upgrade-cost { font-size: 0.7em; color: #aaa; }
        .upgrade-btn { background: linear-gradient(135deg, #009944, #006633); color: white; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8em; font-weight: bold; transition: all 0.3s ease; white-space: nowrap; }
        .upgrade-btn:hover { background: linear-gradient(135deg, #00bb55, #008844); box-shadow: 0 5px 15px rgba(0, 150, 50, 0.4); }
        .upgrade-btn:disabled { background: #333; cursor: not-allowed; }
        .fleet-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .fleet-slot { background: rgba(0, 15, 30, 0.7); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; padding: 15px; transition: all 0.3s ease; }
        .fleet-slot.active { border: 2px solid #ffaa00; animation: glow 2s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(255, 170, 0, 0.3); } 50% { box-shadow: 0 0 30px rgba(255, 170, 0, 0.6); } }
        .fleet-slot-title { font-weight: bold; color: #00b4ff; margin-bottom: 10px; font-size: 0.9em; }
        .ship-selector-mini { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 10px; }
        .ship-select-item-mini { display: flex; align-items: center; justify-content: space-between; gap: 5px; font-size: 0.8em; }
        .ship-select-item-mini input { width: 50px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 4px; border-radius: 5px; text-align: center; font-size: 0.8em; }
        .fleet-timer { text-align: center; font-size: 0.85em; color: #ffaa00; margin: 8px 0; min-height: 20px; }
        .btn-small { background: linear-gradient(135deg, #0066cc, #0044aa); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; width: 100%; }
        .btn-small:hover { background: linear-gradient(135deg, #0088ff, #0055cc); box-shadow: 0 5px 15px rgba(0, 100, 200, 0.4); }
        .btn-small:disabled { background: #333; cursor: not-allowed; box-shadow: none; }
        .build-queue { margin-top: 10px; padding: 10px; background: rgba(255, 170, 0, 0.1); border-radius: 8px; border: 1px solid rgba(255, 170, 0, 0.3); display: none; }
        .build-queue.active { display: block; }
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 0.8em; color: #ffaa00; }
        .queue-parallel-info { font-size: 0.75em; color: #ffaa00; margin-bottom: 8px; padding: 5px; background: rgba(255, 170, 0, 0.2); border-radius: 5px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85em; }
        .stat-item { background: rgba(0, 20, 40, 0.6); padding: 8px; border-radius: 8px; text-align: center; }
        .stat-value { font-weight: bold; color: #00b4ff; font-size: 1.2em; }
        .stat-label { font-size: 0.7em; color: #999; text-transform: uppercase; }
        .history-list { max-height: 300px; overflow-y: auto; font-size: 0.8em; }
        .history-item { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
        .history-item .gain { color: #44ff44; }
        .history-item .loss { color: #ff4444; }
        .history-item .info { color: #ffaa00; }
        .history-item .pirate { color: #ff8800; }
        .history-item .warning { color: #ffaa00; }
        .full-width { grid-column: 1 / -1; }
        @media (max-width: 1200px) { .fleet-slots { grid-template-columns: 1fr; } .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <header>
            <button class="reset-btn" onclick="resetGame()">🔄 Reset</button>
            <button class="sound-toggle" onclick="toggleSound()">🔊 Sound</button>
            <div class="save-indicator" id="saveIndicator">💾 Gespeichert</div>
            <div class="offline-indicator" id="offlineIndicator"></div>
            <h1>🚀 OGame Expedition</h1>
            <div class="subtitle">Deep Space Exploration Fleet</div>
        </header>
        <div class="main-grid">
            <div class="panel">
                <div class="panel-title">💎 Ressourcen</div>
                <div class="resource-grid">
                    <div class="resource-item metal"><div class="resource-icon">🟤</div><div class="resource-value" id="metal">50.000.000</div><div class="resource-label">Metall</div></div>
                    <div class="resource-item crystal"><div class="resource-icon">🟢</div><div class="resource-value" id="crystal">40.000.000</div><div class="resource-label">Kristall</div></div>
                    <div class="resource-item deuterium"><div class="resource-icon">🟣</div><div class="resource-value" id="deuterium">30.000.000</div><div class="resource-label">Deuterium</div></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">⬆️ Upgrades</div>
                <div class="upgrade-grid" id="upgradeGrid"></div>
            </div>
        </div>
        <div class="main-grid">
            <div class="panel">
                <div class="panel-title" id="shipBuildTitle">🔧 Schiffe bauen <span style="font-size:0.7em;color:#ffaa00;"></span></div>
                <div class="ship-build-grid" id="shipBuildGrid"></div>
                <div class="build-queue" id="buildQueue"><strong style="color:#ffaa00;">⏳ Bauaufträge:</strong><div id="queueItems"></div></div>
            </div>
            <div class="panel">
                <div class="panel-title">📊 Statistiken</div>
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </div>
        <div class="panel full-width" style="margin-bottom: 25px;">
            <div class="panel-title">🌌 Expeditionsflotten (3 Slots)</div>
            <div class="fleet-slots" id="fleetSlots"></div>
        </div>
        <div class="panel full-width">
            <div class="panel-title">📋 Expeditions-Historie</div>
            <div class="history-list" id="historyList"><div style="text-align:center;color:#666;">Noch keine Expeditionen durchgeführt</div></div>
        </div>
    </div>
    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let soundEnabled = true;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }
        function playSound(f, d, t = 'sine', v = 0.3) {
            if (!soundEnabled) return;
            try {
                initAudio();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = t;
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.start(audioCtx.currentTime);
                o.stop(audioCtx.currentTime + d);
            } catch (e) {}
        }
        function playBuildSound() { playSound(800, 0.2, 'square', 0.1); }
        function playExpeditionStartSound() { playSound(300, 0.5, 'sine', 0.2); setTimeout(() => playSound(500, 0.3, 'sine', 0.2), 200); setTimeout(() => playSound(800, 0.4, 'sine', 0.2), 400); }
        function playExpeditionCompleteSound() { playSound(600, 0.3, 'triangle', 0.3); setTimeout(() => playSound(900, 0.3, 'triangle', 0.3), 150); setTimeout(() => playSound(1200, 0.5, 'triangle', 0.3), 300); }
        function playCombatSound() { playSound(100, 0.4, 'sawtooth', 0.15); setTimeout(() => playSound(80, 0.3, 'sawtooth', 0.15), 200); setTimeout(() => playSound(120, 0.2, 'sawtooth', 0.15), 400); }
        function toggleSound() { soundEnabled = !soundEnabled; document.querySelector('.sound-toggle').textContent = soundEnabled ? '🔊 Sound' : '🔇 Stumm'; saveGameState(); }

        const pirateShipTypes = [
            { name: 'Piraten-Jäger', icon: '☠️✈️', baseCost: 8000 },
            { name: 'Piraten-Fregatte', icon: '☠️🚢', baseCost: 30000 },
            { name: 'Piraten-Kreuzer', icon: '☠️🛡️', baseCost: 80000 },
            { name: 'Piraten-Zerstörer', icon: '☠️💥', baseCost: 150000 }
        ];

        const DEFAULT_STATE = {
            resources: { metal: 50000000, crystal: 40000000, deuterium: 30000000 },
            ships: { großerTransporter: { count: 300 }, schlachtkreuzer: { count: 0 }, zerstörer: { count: 0 }, schwererJäger: { count: 0 } },
            upgrades: { weapons: 0, shields: 0, armor: 0, shipyard: 0 },
            // Neue Struktur: pro Schiffstyp eine eigene Queue
            shipQueues: {
                großerTransporter: [],
                schlachtkreuzer: [],
                zerstörer: [],
                schwererJäger: []
            },
            expeditions: [
                { active: false, startTime: null, returnTime: null, phase: null, selectedShips: { großerTransporter: 0, schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 } },
                { active: false, startTime: null, returnTime: null, phase: null, selectedShips: { großerTransporter: 0, schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 } },
                { active: false, startTime: null, returnTime: null, phase: null, selectedShips: { großerTransporter: 0, schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 } }
            ],
            stats: { totalExpeditions: 0, totalMetalFound: 0, totalCrystalFound: 0, totalDeuteriumFound: 0, totalShipsBuilt: 0, totalShipsLost: 0, totalPirateShipsDestroyed: 0, totalCombats: 0 },
            history: [], lastSaveTime: Date.now()
        };

        let state = loadGameState();

        function loadGameState() {
            try {
                const saved = localStorage.getItem('ogameExpeditionState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    soundEnabled = parsed.soundEnabled !== undefined ? parsed.soundEnabled : true;
                    const loaded = deepMerge(DEFAULT_STATE, parsed);
                    if (!loaded.stats.totalPirateShipsDestroyed) loaded.stats.totalPirateShipsDestroyed = 0;
                    if (!loaded.upgrades.shipyard) loaded.upgrades.shipyard = 0;
                    if (!loaded.shipQueues) loaded.shipQueues = JSON.parse(JSON.stringify(DEFAULT_STATE.shipQueues));
                    return loaded;
                }
            } catch (e) { console.error('Fehler beim Laden:', e); }
            return JSON.parse(JSON.stringify(DEFAULT_STATE));
        }
        function deepMerge(target, source) {
            const output = { ...target };
            for (const key in source) {
                if (source[key] instanceof Object && !Array.isArray(source[key])) output[key] = deepMerge(target[key] || {}, source[key]);
                else output[key] = source[key];
            }
            return output;
        }
        function saveGameState() {
            try {
                state.lastSaveTime = Date.now();
                const saveData = JSON.parse(JSON.stringify(state));
                saveData.soundEnabled = soundEnabled;
                localStorage.setItem('ogameExpeditionState', JSON.stringify(saveData));
                showSaveIndicator();
            } catch (e) { console.error('Fehler beim Speichern:', e); }
        }
        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('visible');
            setTimeout(() => indicator.classList.remove('visible'), 2000);
        }
        function resetGame() {
            if (confirm('Wirklich zurücksetzen?')) {
                localStorage.removeItem('ogameExpeditionState');
                state = JSON.parse(JSON.stringify(DEFAULT_STATE));
                updateDisplay();
            }
        }

        const shipDefinitions = {
            großerTransporter: { name: 'Großer Transporter', icon: '🚛', capacity: 250000, baseWeapons: 50, baseShields: 100, baseArmor: 200, cost: { metal: 60000, crystal: 30000, deuterium: 15000 }, buildTime: 2 },
            schlachtkreuzer: { name: 'Schlachtkreuzer', icon: '🛡️', capacity: 0, baseWeapons: 700, baseShields: 400, baseArmor: 700, cost: { metal: 30000, crystal: 40000, deuterium: 15000 }, buildTime: 2 },
            zerstörer: { name: 'Zerstörer', icon: '💥', capacity: 0, baseWeapons: 1000, baseShields: 500, baseArmor: 1000, cost: { metal: 60000, crystal: 50000, deuterium: 15000 }, buildTime: 2 },
            schwererJäger: { name: 'Schwerer Jäger', icon: '✈️', capacity: 0, baseWeapons: 150, baseShields: 75, baseArmor: 100, cost: { metal: 10000, crystal: 6000, deuterium: 2000 }, buildTime: 2 }
        };

        function getMaxParallelBuilds() { return 1 + (state.upgrades.shipyard || 0); }
        
        // Gibt zurück, wie viele verschiedene Schiffstypen gerade aktiv bauen
        function getActiveBuildingTypes() {
            let active = 0;
            for (const shipType of Object.keys(state.shipQueues)) {
                if (state.shipQueues[shipType].length > 0) active++;
            }
            return active;
        }
        
        function getUpgradedStats(st) {
            const d = shipDefinitions[st];
            const wb = 1 + state.upgrades.weapons * 0.1, sb = 1 + state.upgrades.shields * 0.1, ab = 1 + state.upgrades.armor * 0.1;
            return { weapons: Math.floor(d.baseWeapons * wb), shields: Math.floor(d.baseShields * sb), armor: Math.floor(d.baseArmor * ab) };
        }
        function getUpgradeCost(t) {
            const l = state.upgrades[t];
            let bc = { metal: 500000, crystal: 250000, deuterium: 100000 };
            if (t === 'shipyard') bc = { metal: 2000000, crystal: 1000000, deuterium: 500000 };
            const m = Math.pow(2, l);
            return { metal: Math.floor(bc.metal * m), crystal: Math.floor(bc.crystal * m), deuterium: Math.floor(bc.deuterium * m) };
        }
        function getMaxShipyardLevel() { return 3; }

        function processOfflineProgress() {
            const now = Date.now();
            if (now - state.lastSaveTime < 1000) return;
            
            // Prozessiere alle Schiffswerften parallel
            let anyCompleted = false;
            for (const shipType of Object.keys(state.shipQueues)) {
                const queue = state.shipQueues[shipType];
                while (queue.length > 0 && queue[0].endTime <= now) {
                    const item = queue.shift();
                    state.ships[shipType].count += item.count;
                    state.stats.totalShipsBuilt += item.count;
                    anyCompleted = true;
                }
            }
            
            let ec = 0;
            for (let i = 0; i < 3; i++) {
                if (state.expeditions[i].active && state.expeditions[i].returnTime <= now) { completeSlotExpedition(i, true); ec++; }
            }
            if (ec > 0 || anyCompleted) {
                const td = now - state.lastSaveTime;
                const min = Math.floor(td / 60000);
                showOfflineIndicator(`✅ ${Math.floor(min/60)}h ${min%60}min Offline: ${ec} Expedition(en) abgeschlossen, Baufortschritt verarbeitet`);
            }
            state.lastSaveTime = now;
            saveGameState();
        }
        function showOfflineIndicator(m) {
            const i = document.getElementById('offlineIndicator');
            i.textContent = m; i.classList.add('visible');
            setTimeout(() => i.classList.remove('visible'), 5000);
        }

        function updateDisplay() {
            document.getElementById('metal').textContent = state.resources.metal.toLocaleString();
            document.getElementById('crystal').textContent = state.resources.crystal.toLocaleString();
            document.getElementById('deuterium').textContent = state.resources.deuterium.toLocaleString();
            renderUpgrades(); renderShipBuildCards(); renderFleetSlots(); renderBuildQueue(); renderStats(); renderHistory();
            saveGameState();
        }
        function canAfford(c, n = 1) { return state.resources.metal >= c.metal * n && state.resources.crystal >= c.crystal * n && state.resources.deuterium >= c.deuterium * n; }
        function deduct(c, n = 1) { state.resources.metal -= c.metal * n; state.resources.crystal -= c.crystal * n; state.resources.deuterium -= c.deuterium * n; updateDisplay(); }

        function buildShips(shipType) {
            const inp = document.getElementById(`build_${shipType}`);
            let cnt = parseInt(inp.value) || 0;
            if (cnt <= 0) { alert('Mindestens 1!'); return; }
            
            // Begrenze auf maximal 100 pro Bauauftrag
            if (cnt > 100) cnt = 100;
            
            if (state.expeditions.some(e => e.active)) { alert('Während Expeditionen kein Bau möglich!'); return; }
            
            const def = shipDefinitions[shipType];
            const maxParallel = getMaxParallelBuilds();
            const activeTypes = getActiveBuildingTypes();
            
            // Prüfen: Baut dieser Typ bereits?
            const isBuilding = state.shipQueues[shipType].length > 0;
            
            // Wenn dieser Typ NICHT baut, prüfen ob noch ein Werft-Slot frei ist
            if (!isBuilding && activeTypes >= maxParallel) {
                alert(`Werft ausgelastet! Maximal ${maxParallel} Schiffstypen gleichzeitig. Warte bis ein anderer Typ fertig ist.`);
                return;
            }
            
            if (!canAfford(def.cost, cnt)) { alert('Nicht genug Ressourcen!'); return; }
            deduct(def.cost, cnt);
            
            // Berechne Startzeit für die neuen Schiffe
            let startTime = Date.now();
            const queue = state.shipQueues[shipType];
            
            if (queue.length > 0) {
                // Wenn bereits Schiffe dieses Typs in der Queue sind, startet der neue Auftrag nach dem letzten
                startTime = queue[queue.length - 1].endTime;
            } else {
                // Wenn dieser Typ gerade nicht baut, aber alle Slots belegt sind? 
                // Dann muss gewartet werden bis ein Slot frei wird
                if (activeTypes >= maxParallel) {
                    // Finde den frühesten freien Slot: das ist die früheste Endzeit aller aktiven Queues
                    let earliestFreeTime = Infinity;
                    for (const [type, q] of Object.entries(state.shipQueues)) {
                        if (q.length > 0 && q[0].endTime < earliestFreeTime) {
                            earliestFreeTime = q[0].endTime;
                        }
                    }
                    if (earliestFreeTime !== Infinity && earliestFreeTime > startTime) {
                        startTime = earliestFreeTime;
                    }
                }
            }
            
            // Füge die Schiffe zur Queue hinzu (jedes Schiff einzeln für korrekte Timer)
            for (let i = 0; i < cnt; i++) {
                queue.push({
                    count: 1,
                    startTime: startTime + i * def.buildTime * 1000,
                    endTime: startTime + (i + 1) * def.buildTime * 1000
                });
            }
            
            playBuildSound();
            inp.value = 1;
            updateDisplay();
            scheduleQueueCheck();
        }
        
        function scheduleQueueCheck() {
            // Finde die nächste anstehende Fertigstellung über alle Queues
            let nextFinish = Infinity;
            for (const queue of Object.values(state.shipQueues)) {
                if (queue.length > 0 && queue[0].endTime < nextFinish) {
                    nextFinish = queue[0].endTime;
                }
            }
            
            if (nextFinish === Infinity) return;
            
            const delay = Math.max(0, nextFinish - Date.now());
            setTimeout(() => {
                processOfflineProgress();
                updateDisplay();
                scheduleQueueCheck();
            }, Math.min(delay, 1000));
        }

            const c = getUpgradeCost(t);

            deduct(c); state.upgrades[t]++; playBuildSound(); updateDisplay();
        }

                    currentValues[key] = existingInput.value;
                }
            }

            for (const key of Object.keys(shipDefinitions)) {
                availableShips[key] = state.ships[key].count;
            }
            
            for (let i = 0; i < 3; i++) {
                if (state.expeditions[i].active) {
                    for (const [key, count] of Object.entries(state.expeditions[i].selectedShips)) {
                        availableShips[key] -= count;
                    }
                }
            }
            
            for (let i = 0; i < 3; i++) {
                if (i !== si && !state.expeditions[i].active) {
                    for (const key of Object.keys(shipDefinitions)) {
                        const otherInput = document.getElementById(`slot${i}_${key}`);
                        if (otherInput) {
                            availableShips[key] -= (parseInt(otherInput.value) || 0);
                        }
                    }
                }
            }
            
            for (const key of Object.keys(shipDefinitions)) {
                availableShips[key] = Math.max(0, availableShips[key]);
            }
            
            sd.innerHTML = '';
            for (const [key, def] of Object.entries(shipDefinitions)) {

                item.className = 'ship-select-item-mini';

                    <span>${def.icon} ${def.name} (${maxAvailable} verfügbar)</span>

        function updateSlotAvailability() {
            for (let slotIndex = 0; slotIndex < 3; slotIndex++) {
                if (!state.expeditions[slotIndex].active) {
                    const availableTotal = {};
                    for (const key of Object.keys(shipDefinitions)) {
                        availableTotal[key] = state.ships[key].count;
                    }
                    
                    for (let i = 0; i < 3; i++) {
                        if (state.expeditions[i].active) {
                            for (const [key, count] of Object.entries(state.expeditions[i].selectedShips)) {
                                availableTotal[key] -= count;
                            }
                        }
                    }
                    
                    for (let i = 0; i < 3; i++) {
                        if (i !== slotIndex && !state.expeditions[i].active) {
                            for (const key of Object.keys(shipDefinitions)) {
                                const otherInput = document.getElementById(`slot${i}_${key}`);
                                if (otherInput) {
                                    availableTotal[key] -= (parseInt(otherInput.value) || 0);
                                }
                            }
                        }
                    }
                    
                    for (const key of Object.keys(shipDefinitions)) {
                        availableTotal[key] = Math.max(0, availableTotal[key]);
                    }
                    
                    for (const key of Object.keys(shipDefinitions)) {
                        const input = document.getElementById(`slot${slotIndex}_${key}`);
                        const label = input?.parentElement?.querySelector('span');
                        if (input && label) {
                            const currentValue = parseInt(input.value) || 0;
                            const maxAvailable = availableTotal[key];
                            if (currentValue > maxAvailable) {
                                input.value = maxAvailable;
                            }
                            input.max = maxAvailable;
                            label.textContent = `${shipDefinitions[key].icon} ${shipDefinitions[key].name} (${maxAvailable} verfügbar)`;
                        }
                    }
                }
            }
        }

            const sel = {}; let t = 0;
            for (const key of Object.keys(shipDefinitions)) { const inp = document.getElementById(`slot${si}_${key}`); const v = parseInt(inp?.value) || 0; sel[key] = v; t += v; }
            return { selected: sel, total: t };
        }

        function startSlotExpedition(si) {
            // Prüfen ob noch gebaut wird
            let building = false;
            for (const queue of Object.values(state.shipQueues)) {
                if (queue.length > 0) { building = true; break; }
            }
            if (building) { alert('Warte bis alle Bauaufträge fertig sind!'); return; }
            
            const { selected, total } = getSlotShips(si);
            if (total === 0) { alert('Mindestens 1 Schiff!'); return; }
            
            const shipUsage = {};
            for (const key of Object.keys(shipDefinitions)) shipUsage[key] = 0;
            
            for (let i = 0; i < 3; i++) {
                if (state.expeditions[i].active) {
                    for (const [key, count] of Object.entries(state.expeditions[i].selectedShips)) {
                        shipUsage[key] += count;
                    }
                }
            }
            
            for (let i = 0; i < 3; i++) {
                if (i !== si && !state.expeditions[i].active) {
                    const otherShips = getSlotShips(i);
                    for (const [key, count] of Object.entries(otherShips.selected)) {
                        shipUsage[key] += count;
                    }
                }
            }
            
            for (const [key, count] of Object.entries(selected)) {
                if (state.ships[key].count < (shipUsage[key] || 0) + count) {
                    alert(`Nicht genug ${shipDefinitions[key].name}! (${state.ships[key].count} verfügbar, ${(shipUsage[key] || 0) + count} benötigt)`);
                    return;
                }
            }
            
            for (const [key, count] of Object.entries(selected)) {
                state.ships[key].count -= count;
            }
            
            const now = Date.now();
            const exp = state.expeditions[si];
            exp.active = true;
            exp.selectedShips = { ...selected };
            exp.startTime = now;
            exp.phase = 'outbound';
            exp.returnTime = now + 50 * 60 * 1000;
            
            playExpeditionStartSound();
            updateDisplay();
            scheduleExpeditionCheck(si);
        }

        function scheduleExpeditionCheck(si) {
            const exp = state.expeditions[si];
            if (!exp.active) return;
            const now = Date.now(), rem = exp.returnTime - now;
            if (rem <= 0) { completeSlotExpedition(si); return; }
            const el = now - exp.startTime;
            if (el < 10 * 60 * 1000) exp.phase = 'outbound';
            else if (el < 40 * 60 * 1000) exp.phase = 'holding';
            else exp.phase = 'return';
            const slot = document.querySelectorAll('.fleet-slot')[si];
            if (slot && exp.active) {
                const min = Math.floor(Math.max(0, rem) / 60000), sec = Math.floor((Math.max(0, rem) % 60000) / 1000);
                const pn = { outbound: 'Hinflug', holding: 'Expedition', return: 'Rückflug' };
                const sl = Object.entries(exp.selectedShips).filter(([_,c]) => c > 0).map(([k,c]) => `${c}x ${shipDefinitions[k].icon}`).join(' ');
                const tEl = slot.querySelector('.fleet-slot-title'), tiEl = slot.querySelector('.fleet-timer'), sEl = slot.querySelector('div:last-child');
                if (tEl) tEl.textContent = `🚀 Flotte ${si+1} - ${pn[exp.phase]}`;
                if (tiEl) tiEl.textContent = `⏳ ${min}:${sec.toString().padStart(2,'0')}`;
                if (sEl) sEl.textContent = sl || 'Keine Schiffe';
            }
            setTimeout(() => scheduleExpeditionCheck(si), Math.min(rem, 1000));
        }

        function generatePirateFleet(playerPower) {
            const pf = {};
            let targetPower = playerPower * (0.6 + Math.random() * 0.8);
            let totalShips = 0;
            const shipPool = [...pirateShipTypes];
            while (targetPower > 2000 && totalShips < 40) {
                const shipType = shipPool[Math.floor(Math.random() * shipPool.length)];
                const shipCost = shipType.baseCost;
                const maxCount = Math.floor(targetPower / shipCost);
                let count = Math.max(1, Math.floor(Math.random() * Math.min(maxCount, 8)) + 1);
                count = Math.min(count, Math.floor(targetPower / shipCost));
                if (count > 0) {
                    pf[shipType.name] = (pf[shipType.name] || 0) + count;
                    targetPower -= count * shipCost;
                    totalShips += count;
                } else break;
            }
            if (totalShips === 0 && playerPower > 0) pf[pirateShipTypes[0].name] = 1;
            return pf;
        }

        function completeSlotExpedition(si, isOffline = false) {
            const exp = state.expeditions[si];
            const { selectedShips } = exp;
            const reportLines = [];
            let totalMetalGain = 0, totalCrystalGain = 0, totalDeuteriumGain = 0;
            const survivingShips = {};
            const destroyedShips = {};
            
            for (const [key, count] of Object.entries(selectedShips)) {
                survivingShips[key] = count;
                destroyedShips[key] = 0;
            }
            
            state.stats.totalExpeditions++;
            
            const fleetList = Object.entries(selectedShips).filter(([_, count]) => count > 0).map(([key, count]) => `${count}x ${shipDefinitions[key].icon}${shipDefinitions[key].name}`).join(', ');
            reportLines.push(`<strong>🚀 Flotte ${si + 1}:</strong> ${fleetList || 'Keine Schiffe'}`);
            
            let availableCapacity = 0;
            for (const [key, count] of Object.entries(selectedShips)) {
                if (shipDefinitions[key].capacity > 0) availableCapacity += count * shipDefinitions[key].capacity;
            }
            
            const eventRoll = Math.random() * 100;
            let eventType = 'nothing';
            if (eventRoll < 60) eventType = 'resources';
            else if (eventRoll < 90) eventType = 'combat';
            else eventType = 'nothing';
            
            if (eventType === 'resources') {
                const sizeRoll = Math.random();
                let resourceAmount = 0, sizeText = '';
                if (sizeRoll < 0.6) { resourceAmount = 1000000; sizeText = 'kleinen'; }
                else if (sizeRoll < 0.9) { resourceAmount = 5000000; sizeText = 'mittleren'; }
                else { resourceAmount = 25000000; sizeText = 'großen'; }
                
                if (availableCapacity > 0) {
                    const maxPerResource = Math.floor(availableCapacity / 3);
                    if (resourceAmount > maxPerResource) {
                        reportLines.push(`<span class="warning">⚠️ Laderaum begrenzt! Ein ${sizeText}er Fund (${resourceAmount.toLocaleString()} pro Ressource) wurde entdeckt, aber nur ${maxPerResource.toLocaleString()} pro Ressource konnten mitgenommen werden.</span>`);
                        resourceAmount = maxPerResource;
                    }
                    if (resourceAmount > 0) {
                        totalMetalGain += resourceAmount; totalCrystalGain += resourceAmount; totalDeuteriumGain += resourceAmount;
                        state.stats.totalMetalFound += resourceAmount; state.stats.totalCrystalFound += resourceAmount; state.stats.totalDeuteriumFound += resourceAmount;
                        reportLines.push(`<span class="gain">✅ Ressourcenfund (${sizeText}): +${resourceAmount.toLocaleString()} Metall, +${resourceAmount.toLocaleString()} Kristall, +${resourceAmount.toLocaleString()} Deuterium</span>`);
                    }
                } else {
                    reportLines.push(`<span class="warning">📦 Keine Transporter dabei! Ein ${sizeText}er Ressourcenfund wurde entdeckt, konnte aber nicht mitgenommen werden (Laderaum: 0).</span>`);
                }
            }
            
            if (eventType === 'combat') {
                state.stats.totalCombats++;
                if (!isOffline) playCombatSound();
                
                let playerPower = 0;
                for (const [key, count] of Object.entries(selectedShips)) {
                    const stats = getUpgradedStats(key);
                    playerPower += count * (stats.weapons + stats.shields + stats.armor);
                }
                
                const strengthRoll = Math.random();
                let strengthPercent = 0, strengthText = '';
                if (strengthRoll < 0.33) { strengthPercent = 0.5 + Math.random() * 0.3; strengthText = 'schwache'; }
                else if (strengthRoll < 0.66) { strengthPercent = 0.8 + Math.random() * 0.4; strengthText = 'mittlere'; }
                else { strengthPercent = 1.2 + Math.random() * 0.8; strengthText = 'starke'; }
                
                const piratePower = playerPower * strengthPercent;
                const pirateFleet = generatePirateFleet(piratePower);
                
                reportLines.push(`<span class="loss">⚔️ Piratenangriff (${strengthText} Piratenflotte, ${Math.round(strengthPercent * 100)}% deiner Stärke)!</span>`);
                reportLines.push(`<span class="info">📋 Deine Flotte:</span> ${Object.entries(selectedShips).filter(([_,c]) => c > 0).map(([k,c]) => `${c}x ${shipDefinitions[k].icon}`).join(' ')}`);
                
                const powerRatio = playerPower / (playerPower + piratePower);
                const lossFactor = (1 - powerRatio) * 0.7;
                
                let totalMetalLost = 0, totalCrystalLost = 0, totalDeuteriumLost = 0;
                let totalPirateShipsDestroyed = 0;
                let pirateResourcesGained = 0;
                
                for (const [key, count] of Object.entries(selectedShips)) {
                    const losses = Math.floor(count * lossFactor * (0.7 + Math.random() * 0.6));
                    destroyedShips[key] = losses;
                    survivingShips[key] = count - losses;
                    if (losses > 0) {
                        state.stats.totalShipsLost += losses;
                        const def = shipDefinitions[key];
                        totalMetalLost += losses * def.cost.metal;
                        totalCrystalLost += losses * def.cost.crystal;
                        totalDeuteriumLost += losses * def.cost.deuterium;
                    }
                }
                
                const destroyedList = Object.entries(destroyedShips).filter(([_, count]) => count > 0).map(([key, count]) => `${count}x ${shipDefinitions[key].icon}${shipDefinitions[key].name}`).join(', ');
                if (destroyedList) reportLines.push(`<span class="loss">💥 Deine Verluste:</span> ${destroyedList}`);
                else reportLines.push(`<span class="gain">✨ Keine eigenen Verluste!</span>`);
                
                const pirateLossFactor = powerRatio * 0.6;
                const destroyedPirates = {};
                for (const [pirateName, pirateCount] of Object.entries(pirateFleet)) {
                    const losses = Math.floor(pirateCount * pirateLossFactor * (0.6 + Math.random() * 0.8));
                    if (losses > 0) {
                        destroyedPirates[pirateName] = losses;
                        totalPirateShipsDestroyed += losses;
                        const pirateDef = pirateShipTypes.find(p => p.name === pirateName);
                        if (pirateDef) pirateResourcesGained += losses * pirateDef.baseCost;
                    }
                }
                state.stats.totalPirateShipsDestroyed += totalPirateShipsDestroyed;
                
                const pirateDestroyedList = Object.entries(destroyedPirates).map(([name, count]) => `${count}x ${name}`).join(', ');
                if (pirateDestroyedList) reportLines.push(`<span class="pirate">💀 Piraten-Verluste:</span> ${pirateDestroyedList} (${totalPirateShipsDestroyed} Schiffe zerstört)`);
                reportLines.push(`<span class="pirate">☠️ Ursprüngliche Piraten-Flotte:</span> ${Object.entries(pirateFleet).map(([n,c]) => `${c}x ${n}`).join(', ')}`);
                
                const ownSalvage = Math.floor((totalMetalLost + totalCrystalLost + totalDeuteriumLost) * 0.6 / 3);
                const pirateSalvage = Math.floor(pirateResourcesGained * 0.6 / 3);
                const totalSalvage = ownSalvage + pirateSalvage;
                
                if (totalSalvage > 0) {
                    totalMetalGain += totalSalvage; totalCrystalGain += totalSalvage; totalDeuteriumGain += totalSalvage;
                    reportLines.push(`<span class="gain">🔧 Bergung (60% der Zerstörungen): +${totalSalvage.toLocaleString()} Metall, +${totalSalvage.toLocaleString()} Kristall, +${totalSalvage.toLocaleString()} Deuterium</span>`);
                    reportLines.push(`<span class="info">   ↳ Eigene Schiffe: ${ownSalvage.toLocaleString()} | Piraten: ${pirateSalvage.toLocaleString()} pro Ressource</span>`);
                }
            }
            
            if (eventType === 'nothing') {
                reportLines.push('<span>🔭 Nichts gefunden - der Sektor war leer.</span>');
            }
            
            state.resources.metal += totalMetalGain;
            state.resources.crystal += totalCrystalGain;
            state.resources.deuterium += totalDeuteriumGain;
            
            for (const [key, count] of Object.entries(survivingShips)) {
                state.ships[key].count += count;
            }
            
            const totalShipsLost = Object.values(destroyedShips).reduce((a, b) => a + b, 0);
            
            state.history.unshift({
                time: new Date().toLocaleString(),
                slot: si + 1,
                report: reportLines.join('<br>'),
                metalGain: totalMetalGain,
                crystalGain: totalCrystalGain,
                deuteriumGain: totalDeuteriumGain,
                shipsLost: totalShipsLost,
                pirateShipsDestroyed: totalPirateShipsDestroyed || 0,
                wasOffline: isOffline
            });
            
            if (state.history.length > 10) state.history.pop();
            
            exp.active = false;
            exp.selectedShips = { großerTransporter: 0, schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 };
            exp.phase = null;
            exp.startTime = null;
            exp.returnTime = null;
            
            if (!isOffline) playExpeditionCompleteSound();
            updateDisplay();
        }

        function renderStats() {
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-item"><div class="stat-value">${state.stats.totalExpeditions}</div><div class="stat-label">Expeditionen</div></div>
                <div class="stat-item"><div class="stat-value">${state.stats.totalCombats}</div><div class="stat-label">Kämpfe</div></div>
                <div class="stat-item"><div class="stat-value">${(state.stats.totalMetalFound + state.stats.totalCrystalFound + state.stats.totalDeuteriumFound).toLocaleString()}</div><div class="stat-label">Ress. gefunden</div></div>
                <div class="stat-item"><div class="stat-value">${state.stats.totalShipsBuilt}</div><div class="stat-label">Schiffe gebaut</div></div>
                <div class="stat-item"><div class="stat-value" style="color:#ff4444;">${state.stats.totalShipsLost}</div><div class="stat-label">Schiffe verloren</div></div>
                <div class="stat-item"><div class="stat-value" style="color:#ff8800;">${state.stats.totalPirateShipsDestroyed || 0}</div><div class="stat-label">Piraten zerstört</div></div>
                <div class="stat-item"><div class="stat-value">🏭${1 + (state.upgrades.shipyard || 0)} ⚔️${state.upgrades.weapons} 🛡️${state.upgrades.shields} ❤️${state.upgrades.armor}</div><div class="stat-label">Upgrades</div></div>`;
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (state.history.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#666;">Keine Expeditionen</div>';
                return;
            }
            list.innerHTML = state.history.map(e => `
                <div class="history-item">
                    <div style="color:#00b4ff;">${e.time} - Flotte ${e.slot}${e.wasOffline ? ' <span style="color:#ffaa00;">(Offline)</span>' : ''}</div>
                    ${e.report}
                    <div style="margin-top:5px;font-size:0.9em;">
                        <span class="gain">+${e.metalGain.toLocaleString()} Metall</span> |
                        <span class="gain">+${e.crystalGain.toLocaleString()} Kristall</span> |
                        <span class="gain">+${e.deuteriumGain.toLocaleString()} Deuterium</span>
                        ${e.shipsLost > 0 ? ` | <span class="loss">-${e.shipsLost} Schiffe</span>` : ''}
                        ${e.pirateShipsDestroyed > 0 ? ` | <span class="pirate">☠️ -${e.pirateShipsDestroyed} Piraten</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function createStars() {
            const sc = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 5 + 's');
                sc.appendChild(star);
            }
        }

        createStars();
        processOfflineProgress();
        scheduleQueueCheck();
        state.expeditions.forEach((exp, i) => { if (exp.active) scheduleExpeditionCheck(i); });
        document.querySelector('.sound-toggle').textContent = soundEnabled ? '🔊 Sound' : '🔇 Stumm';
        updateDisplay();
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                processOfflineProgress();
                scheduleQueueCheck();
                state.expeditions.forEach((exp, i) => { if (exp.active) scheduleExpeditionCheck(i); });
                updateDisplay();
            }
        });
    </script>
</body>
</html>
