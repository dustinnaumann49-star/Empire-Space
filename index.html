<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Lord Kampf-Simulator - Team vs Gegner</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        /* Team Layout */
        .battlefield {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .team {
            flex: 1;
            min-width: 400px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255,215,0,0.3);
        }
        
        .team-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        
        .team-left .team-title {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: #ff6b6b;
            border-left: 4px solid #ff6b6b;
            border-right: 4px solid #ff6b6b;
        }
        
        .team-right .team-title {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: #4ecdc4;
            border-left: 4px solid #4ecdc4;
            border-right: 4px solid #4ecdc4;
        }
        
        .team-left {
            border-left: 4px solid #ff6b6b;
        }
        
        .team-right {
            border-right: 4px solid #4ecdc4;
        }
        
        /* Reihen */
        .row-card {
            background: rgba(20,20,40,0.9);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        
        .team-left .row-card {
            border-right: 3px solid #ff6b6b;
        }
        
        .team-right .row-card {
            border-left: 3px solid #4ecdc4;
        }
        
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .row-number {
            font-size: 18px;
            font-weight: bold;
            background: #ffd700;
            color: #1a1a2e;
            padding: 2px 10px;
            border-radius: 20px;
        }
        
        .alpha-name {
            font-size: 18px;
            font-weight: bold;
        }
        
        .team-left .alpha-name { color: #ff6b6b; }
        .team-right .alpha-name { color: #4ecdc4; }
        
        .beast-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .beast-name {
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 15px;
        }
        
        .beast-count {
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 15px;
            color: #ffd700;
        }
        
        .beast-stats {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #aaa;
        }
        
        .type-carni { color: #ff6b6b; }
        .type-herbi { color: #7bed9f; }
        .type-omni { color: #ffd700; }
        
        .controls {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        
        select, input {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            background: #2c3e50;
            color: white;
        }
        
        .fight-section {
            text-align: center;
            margin: 30px 0;
        }
        
        .fight-btn {
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 15px;
            transition: transform 0.2s;
        }
        
        .fight-btn:hover {
            transform: scale(1.05);
        }
        
        .reset-btn {
            background: #2c3e50;
            color: white;
            padding: 8px 25px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            font-size: 16px;
        }
        
        .report {
            background: #0a0a1a;
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
            border: 1px solid #ffd700;
        }
        
        .report h3 {
            color: #ffd700;
            margin-top: 0;
        }
        
        .report-content {
            background: #050510;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        button {
            cursor: pointer;
        }
        
        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px #000;
            padding: 0 10px;
        }
        
        @media (max-width: 900px) {
            .battlefield {
                flex-direction: column;
            }
            .vs-divider {
                font-size: 24px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🐺 Beast Lord Kampf-Simulator ⚔️</h1>
    <div class="subtitle">Dein Team | VS | Gegner</div>

    <div class="battlefield">
        <!-- LINKES TEAM (DEIN TEAM) -->
        <div class="team team-left">
            <div class="team-title">⚔️ DEIN TEAM ⚔️</div>
            <div id="player-rows"></div>
        </div>
        
        <div class="vs-divider">VS</div>
        
        <!-- RECHTES TEAM (GEGNER) -->
        <div class="team team-right">
            <div class="team-title">🛡️ GEGNER 🛡️</div>
            <div id="enemy-rows"></div>
        </div>
    </div>

    <div class="fight-section">
        <button class="fight-btn" id="fightBtn">🔥 KAMPF STARTEN 🔥</button>
        <button class="reset-btn" id="resetBtn">↺ Standard Aufstellung</button>
    </div>

    <div class="report">
        <h3>📜 KAMPFBERICHT</h3>
        <div class="report-content" id="report-content">
            ⚔️ Klicke auf "KAMPF STARTEN" um zu beginnen ⚔️
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== BESTIEN ==========
        const BEASTS = {
            hoelhenhyaene: { name: "Höhlenhyäne", type: "carni", attack: 151, defense: 63, hp: 20 },
            langhornbison: { name: "Langhornbison", type: "herbi", attack: 99, defense: 102, hp: 28 },
            gigantopithecus: { name: "Gigantopithecus", type: "omni", attack: 121, defense: 78, hp: 24 }
        };

        // ========== ALPHAS ==========
        const ALPHAS = {
            smilodon: { name: "Smilodon", type: "carni", skillChance: 0.8, skillMulti: 2.0, skillName: "Tödlicher Comboschlag" },
            beutelloewe: { name: "Beutellöwe", type: "carni", skillChance: 0.6, skillMulti: 2.15, skillName: "Nachstoß" },
            hyaenodon: { name: "Hyaenodon", type: "carni", skillChance: 0.5, skillMulti: 1.8, skillName: "Erstschlag" },
            amerikanischerGepard: { name: "Amerikanischer Gepard", type: "carni", skillChance: 0.5, skillMulti: 1.7, skillName: "Blitzangriff" },
            metridiochoerus: { name: "Metridiochoerus", type: "omni", skillChance: 0.6, skillMulti: 2.0, skillName: "Schwingenschlag" },
            dinopithecus: { name: "Dinopithecus", type: "omni", skillChance: 0.7, skillMulti: 2.2, skillName: "Echter Schaden" },
            elefantenvogel: { name: "Elefantenvogel", type: "omni", skillChance: 0.5, skillMulti: 1.8, skillName: "Reaktiver Schlag" },
            kurznasenbaer: { name: "Kurznasenbär", type: "omni", skillChance: 0.7, skillMulti: 2.5, skillName: "Ausnutzen" },
            riesenSivatherium: { name: "Riesen Sivatherium", type: "herbi", skillChance: 0.5, skillMulti: 1.6, skillName: "Verwirrender Tritt" },
            meiolanja: { name: "Meiolanja", type: "herbi", skillChance: 0.6, skillMulti: 1.5, skillName: "Gegenschlag" },
            mammut: { name: "Mammut", type: "herbi", skillChance: 0.5, skillMulti: 1.7, skillName: "Gegenangriff" },
            megatherium: { name: "Megatherium", type: "herbi", skillChance: 0.6, skillMulti: 2.0, skillName: "Fokussierter Schlag" }
        };

        // ========== STANDARD AUFSTELLUNG (wie gewünscht) ==========
        let defaultPlayer = [
            { alpha: "beutelloewe", beast: "hoelhenhyaene", count: 100000 },
            { alpha: "amerikanischerGepard", beast: "hoelhenhyaene", count: 100000 },
            { alpha: "smilodon", beast: "hoelhenhyaene", count: 100000 }
        ];
        
        let defaultEnemy = [
            { alpha: "riesenSivatherium", beast: "langhornbison", count: 120000 },
            { alpha: "mammut", beast: "langhornbison", count: 110000 },
            { alpha: "megatherium", beast: "langhornbison", count: 100000 }
        ];

        let playerRows = JSON.parse(JSON.stringify(defaultPlayer));
        let enemyRows = JSON.parse(JSON.stringify(defaultEnemy));
        
        let logEntries = [];
        
        let roundStats = {
            player: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 },
            enemy: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 }
        };

        function addLog(msg, type) {
            logEntries.push({ msg: msg, type: type || 'info' });
        }

        function clearLog() {
            logEntries = [];
            roundStats = {
                player: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 },
                enemy: { totalDamage: 0, skillDamage: 0, normalDamage: 0, skillUses: 0 }
            };
        }

        function updateUI() {
            const container = document.getElementById('report-content');
            if (!container) return;
            
            let html = '';
            for (let entry of logEntries) {
                let color = '#ccc';
                if (entry.type === 'damage') color = '#ff8888';
                if (entry.type === 'skill') color = '#88ff88';
                if (entry.type === 'heal') color = '#8888ff';
                if (entry.type === 'round') color = '#ffcc66';
                if (entry.type === 'victory') color = '#ffaa44';
                if (entry.type === 'stat') color = '#ffaa88';
                if (entry.type === 'info') color = '#aaa';
                html += `<div style="color: ${color}; margin: 2px 0;">${escapeHtml(entry.msg)}</div>`;
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Schadensberechnung
        function calcDamage(attacker, defender, multi, isSkill = false) {
            let beastDamage = (attacker.beastAttack * (attacker.count / 100)) * multi;
            let alphaBonus = 1 + (attacker.count / 500000);
            if (alphaBonus > 1.5) alphaBonus = 1.5;
            
            let totalDamage = beastDamage * alphaBonus;
            
            let defReduction = defender.beastDefense / 400;
            if (defReduction > 0.6) defReduction = 0.6;
            totalDamage = totalDamage * (1 - defReduction);
            
            // Typ-Vorteil
            let typeBonus = 1.0;
            if (attacker.alphaType === 'carni' && defender.alphaType === 'herbi') typeBonus = 1.25;
            if (attacker.alphaType === 'herbi' && defender.alphaType === 'omni') typeBonus = 1.25;
            if (attacker.alphaType === 'omni' && defender.alphaType === 'carni') typeBonus = 1.25;
            totalDamage = totalDamage * typeBonus;
            
            totalDamage = totalDamage * (0.85 + Math.random() * 0.3);
            
            if (isSkill) totalDamage = totalDamage * 1.5;
            
            return Math.max(1, Math.floor(totalDamage));
        }

        function startFight() {
            clearLog();
            addLog("═══════════════════════════════════════════════════════════", "victory");
            addLog("⚔️ KAMPF BEGINNT - DEIN TEAM vs GEGNER ⚔️", "victory");
            addLog("═══════════════════════════════════════════════════════════", "victory");
            
            // Spieler Einheiten
            let player = playerRows.map((r, idx) => ({
                id: idx,
                rowNum: idx + 1,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                alphaSkillChance: ALPHAS[r.alpha].skillChance,
                alphaSkillMulti: ALPHAS[r.alpha].skillMulti,
                alphaSkillName: ALPHAS[r.alpha].skillName,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                beastAttack: BEASTS[r.beast].attack,
                beastDefense: BEASTS[r.beast].defense,
                beastHp: BEASTS[r.beast].hp,
                beastType: BEASTS[r.beast].type,
                count: r.count,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                isAlive: true,
                totalDamage: 0,
                skillDamage: 0,
                skillUses: 0,
                kills: 0
            }));
            
            // Gegner Einheiten
            let enemy = enemyRows.map((r, idx) => ({
                id: idx,
                rowNum: idx + 1,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                alphaSkillChance: ALPHAS[r.alpha].skillChance,
                alphaSkillMulti: ALPHAS[r.alpha].skillMulti,
                alphaSkillName: ALPHAS[r.alpha].skillName,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                beastAttack: BEASTS[r.beast].attack,
                beastDefense: BEASTS[r.beast].defense,
                beastHp: BEASTS[r.beast].hp,
                beastType: BEASTS[r.beast].type,
                count: r.count,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                isAlive: true,
                totalDamage: 0,
                skillDamage: 0,
                skillUses: 0,
                kills: 0
            }));
            
            // Aufstellung anzeigen
            addLog("\n📋 AUFSTELLUNG:", "stat");
            addLog("┌─────────────────────────────────────────────────────────┐", "stat");
            addLog("│ DEIN TEAM:                                             │", "stat");
            for (let p of player) {
                addLog(`│   Reihe ${p.rowNum}: ${p.alphaName} + ${p.count.toLocaleString()} ${p.beastName}`, "stat");
            }
            addLog("├─────────────────────────────────────────────────────────┤", "stat");
            addLog("│ GEGNER:                                                │", "stat");
            for (let e of enemy) {
                addLog(`│   Reihe ${e.rowNum}: ${e.alphaName} + ${e.count.toLocaleString()} ${e.beastName}`, "stat");
            }
            addLog("└─────────────────────────────────────────────────────────┘", "stat");
            
            let round = 1;
            let maxRounds = 30;
            let winner = null;
            
            while (round <= maxRounds && winner === null) {
                addLog(`\n╔═══════════════════════════════════════════════════════════╗`, "round");
                addLog(`║                      RUNDE ${round}                         ║`, "round");
                addLog(`╚═══════════════════════════════════════════════════════════╝`, "round");
                
                // Aktuelle Stärke anzeigen
                addLog(`\n📊 AKTUELLE TRUPPENSTÄRKE:`, "info");
                for (let p of player) {
                    let percent = p.count > 0 ? ((p.hp / p.maxHp) * 100).toFixed(0) : 0;
                    addLog(`   🟢 ${p.alphaName}: ${p.count.toLocaleString()} Bestien (${percent}% HP)`, "info");
                }
                for (let e of enemy) {
                    let percent = e.count > 0 ? ((e.hp / e.maxHp) * 100).toFixed(0) : 0;
                    addLog(`   🔴 ${e.alphaName}: ${e.count.toLocaleString()} Bestien (${percent}% HP)`, "info");
                }
                
                // DEIN TEAM greift an
                addLog(`\n⚔️ DEIN TEAM greift an:`, "damage");
                for (let p of player) {
                    if (!p.isAlive || p.count <= 0) continue;
                    
                    let target = enemy.find(e => e.isAlive && e.count > 0);
                    if (!target) break;
                    
                    let isSkill = Math.random() < p.alphaSkillChance;
                    let multi = isSkill ? p.alphaSkillMulti : 1.0;
                    let damage = calcDamage(p, target, multi, isSkill);
                    
                    let oldCount = target.count;
                    target.hp -= damage;
                    if (target.hp < 0) target.hp = 0;
                    target.count = Math.floor(target.hp / target.beastHp);
                    
                    p.totalDamage += damage;
                    if (isSkill) {
                        p.skillDamage += damage;
                        p.skillUses++;
                        roundStats.player.skillDamage += damage;
                        roundStats.player.skillUses++;
                        addLog(`   ✨ ${p.alphaName} (Reihe ${p.rowNum}): ${p.alphaSkillName} - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (Reihe ${target.rowNum})`, "skill");
                    } else {
                        roundStats.player.normalDamage += damage;
                        addLog(`   ⚔️ ${p.alphaName} (Reihe ${p.rowNum}): Normaler Angriff - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (Reihe ${target.rowNum})`, "damage");
                    }
                    roundStats.player.totalDamage += damage;
                    
                    let lostCount = oldCount - target.count;
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        p.kills++;
                        addLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde BESIEGT!`, "damage");
                    } else if (lostCount > 0) {
                        addLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName} (${target.count.toLocaleString()} verbleiben)`, "damage");
                    }
                }
                
                // Sieg prüfen
                if (!enemy.some(e => e.isAlive && e.count > 0)) {
                    winner = "DEIN TEAM";
                    break;
                }
                
                // GEGNER greift an
                addLog(`\n🛡️ GEGNER greift an:`, "damage");
                for (let e of enemy) {
                    if (!e.isAlive || e.count <= 0) continue;
                    
                    let target = player.find(p => p.isAlive && p.count > 0);
                    if (!target) break;
                    
                    let isSkill = Math.random() < e.alphaSkillChance;
                    let multi = isSkill ? e.alphaSkillMulti : 1.0;
                    let damage = calcDamage(e, target, multi, isSkill);
                    
                    let oldCount = target.count;
                    target.hp -= damage;
                    if (target.hp < 0) target.hp = 0;
                    target.count = Math.floor(target.hp / target.beastHp);
                    
                    e.totalDamage += damage;
                    if (isSkill) {
                        e.skillDamage += damage;
                        e.skillUses++;
                        roundStats.enemy.skillDamage += damage;
                        roundStats.enemy.skillUses++;
                        addLog(`   ✨ ${e.alphaName} (Reihe ${e.rowNum}): ${e.alphaSkillName} - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (Reihe ${target.rowNum})`, "skill");
                    } else {
                        roundStats.enemy.normalDamage += damage;
                        addLog(`   ⚔️ ${e.alphaName} (Reihe ${e.rowNum}): Normaler Angriff - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (Reihe ${target.rowNum})`, "damage");
                    }
                    roundStats.enemy.totalDamage += damage;
                    
                    let lostCount = oldCount - target.count;
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        e.kills++;
                        addLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde BESIEGT!`, "damage");
                    } else if (lostCount > 0) {
                        addLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName} (${target.count.toLocaleString()} verbleiben)`, "damage");
                    }
                }
                
                // Sieg prüfen
                if (!player.some(p => p.isAlive && p.count > 0)) {
                    winner = "GEGNER";
                    break;
                }
                
                round++;
            }
            
            // ========== KAMPFBERICHT ==========
            addLog(`\n╔═══════════════════════════════════════════════════════════╗`, "victory");
            addLog(`║                    KAMPFBERICHT                          ║`, "victory");
            addLog(`╚═══════════════════════════════════════════════════════════╝`, "victory");
            
            if (winner === null) {
                addLog(`\n⏰ UNENTSCHIEDEN nach ${maxRounds} Runden!`, "victory");
            } else {
                addLog(`\n🏆 SIEGER: ${winner} nach ${round} Runden! 🏆`, "victory");
            }
            
            // Gesamtstatistiken
            addLog(`\n📊 GESAMTSTATISTIK:`, "stat");
            addLog(`┌─────────────────────────────────────────────────────────┐`, "stat");
            addLog(`│ DEIN TEAM:                                             │`, "stat");
            addLog(`│   Gesamtschaden: ${roundStats.player.totalDamage.toLocaleString()}`, "stat");
            addLog(`│   Skills: ${roundStats.player.skillDamage.toLocaleString()} (${roundStats.player.skillUses} mal ausgelöst)`, "stat");
            addLog(`│   Normal: ${roundStats.player.normalDamage.toLocaleString()}`, "stat");
            addLog(`├─────────────────────────────────────────────────────────┤`, "stat");
            addLog(`│ GEGNER:                                                │`, "stat");
            addLog(`│   Gesamtschaden: ${roundStats.enemy.totalDamage.toLocaleString()}`, "stat");
            addLog(`│   Skills: ${roundStats.enemy.skillDamage.toLocaleString()} (${roundStats.enemy.skillUses} mal ausgelöst)`, "stat");
            addLog(`│   Normal: ${roundStats.enemy.normalDamage.toLocaleString()}`, "stat");
            addLog(`└─────────────────────────────────────────────────────────┘`, "stat");
            
            // Details pro Reihe
            addLog(`\n📋 DETAILS PRO REIHE:`, "stat");
            addLog(`┌─────────────────────────────────────────────────────────┐`, "stat");
            addLog(`│ DEIN TEAM:                                             │`, "stat");
            for (let p of player) {
                let status = p.isAlive && p.count > 0 ? "✅ Überlebt" : "💀 Besiegt";
                addLog(`│ Reihe ${p.rowNum}: ${p.alphaName} + ${p.beastName}`, "stat");
                addLog(`│   Schaden: ${p.totalDamage.toLocaleString()} (davon Skills: ${p.skillDamage.toLocaleString()}, ${p.skillUses}×)`, "stat");
                addLog(`│   Kills: ${p.kills} | Status: ${status}`, "stat");
                addLog(`│   Verbleibende Bestien: ${p.count.toLocaleString()}`, "stat");
                if (p !== player[player.length-1]) addLog(`├─────────────────────────────────────────────────────────┤`, "stat");
            }
            addLog(`├─────────────────────────────────────────────────────────┤`, "stat");
            addLog(`│ GEGNER:                                                │`, "stat");
            for (let e of enemy) {
                let status = e.isAlive && e.count > 0 ? "✅ Überlebt" : "💀 Besiegt";
                addLog(`│ Reihe ${e.rowNum}: ${e.alphaName} + ${e.beastName}`, "stat");
                addLog(`│   Schaden: ${e.totalDamage.toLocaleString()} (davon Skills: ${e.skillDamage.toLocaleString()}, ${e.skillUses}×)`, "stat");
                addLog(`│   Kills: ${e.kills} | Status: ${status}`, "stat");
                addLog(`│   Verbleibende Bestien: ${e.count.toLocaleString()}`, "stat");
                if (e !== enemy[enemy.length-1]) addLog(`├─────────────────────────────────────────────────────────┤`, "stat");
            }
            addLog(`└─────────────────────────────────────────────────────────┘`, "stat");
            
            addLog(`\n═══════════════════════════════════════════════════════════`, "victory");
            
            updateUI();
        }
        
        // ========== UI RENDER ==========
        function renderTeams() {
            renderTeam('player-rows', playerRows, 'player');
            renderTeam('enemy-rows', enemyRows, 'enemy');
            attachEvents();
        }
        
        function renderTeam(containerId, rows, team) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            rows.forEach((row, idx) => {
                const alpha = ALPHAS[row.alpha];
                const beast = BEASTS[row.beast];
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row-card';
                rowDiv.innerHTML = `
                    <div class="row-header">
                        <span class="row-number">Reihe ${idx + 1}</span>
                        <span class="alpha-name">${alpha.name}</span>
                    </div>
                    <div class="beast-info">
                        <span class="beast-name ${beast.type === 'carni' ? 'type-carni' : beast.type === 'herbi' ? 'type-herbi' : 'type-omni'}">
                            ${beast.type === 'carni' ? '🥩' : beast.type === 'herbi' ? '🌿' : '🍂'} ${beast.name}
                        </span>
                        <span class="beast-count">📊 ${row.count.toLocaleString()} Bestien</span>
                    </div>
                    <div class="beast-stats">
                        <span>⚔️ Angriff: ${beast.attack}</span>
                        <span>🛡️ Verteidigung: ${beast.defense}</span>
                        <span>❤️ HP: ${beast.hp}</span>
                    </div>
                    <div class="controls">
                        <select class="alpha-select" data-team="${team}" data-row="${idx}">
                            ${Object.keys(ALPHAS).map(key => `<option value="${key}" ${row.alpha === key ? 'selected' : ''}>${ALPHAS[key].name}</option>`).join('')}
                        </select>
                        <select class="beast-select" data-team="${team}" data-row="${idx}">
                            ${Object.keys(BEASTS).map(key => `<option value="${key}" ${row.beast === key ? 'selected' : ''}>${BEASTS[key].name}</option>`).join('')}
                        </select>
                        <input type="number" class="count-input" data-team="${team}" data-row="${idx}" value="${row.count}" step="1000" min="0" style="width: 100px;">
                    </div>
                `;
                container.appendChild(rowDiv);
            });
        }
        
        function attachEvents() {
            document.querySelectorAll('.alpha-select').forEach(select => {
                select.onchange = (e) => {
                    const team = e.target.dataset.team;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (team === 'player') playerRows[row].alpha = val;
                    else enemyRows[row].alpha = val;
                };
            });
            
            document.querySelectorAll('.beast-select').forEach(select => {
                select.onchange = (e) => {
                    const team = e.target.dataset.team;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (team === 'player') playerRows[row].beast = val;
                    else enemyRows[row].beast = val;
                };
            });
            
            document.querySelectorAll('.count-input').forEach(input => {
                input.onchange = (e) => {
                    const team = e.target.dataset.team;
                    const row = parseInt(e.target.dataset.row);
                    const val = parseInt(e.target.value) || 0;
                    if (team === 'player') playerRows[row].count = val;
                    else enemyRows[row].count = val;
                };
            });
        }
        
        function resetSetup() {
            playerRows = JSON.parse(JSON.stringify(defaultPlayer));
            enemyRows = JSON.parse(JSON.stringify(defaultEnemy));
            renderTeams();
            clearLog();
            addLog("🔁 Aufstellung zurückgesetzt!");
            updateUI();
        }
        
        document.getElementById('fightBtn').onclick = () => startFight();
        document.getElementById('resetBtn').onclick = () => resetSetup();
        
        renderTeams();
        addLog("✅ Bereit! Klicke auf 'KAMPF STARTEN'");
        updateUI();
    })();
</script>
</body>
</html>
