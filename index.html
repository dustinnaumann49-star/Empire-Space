<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Lord Kampf-Simulator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .armies-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .army {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            flex: 1;
            min-width: 400px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .army h2 {
            text-align: center;
            margin-top: 0;
        }
        .attacker h2 { color: #ff6b6b; }
        .defender h2 { color: #4ecdc4; }
        
        .row {
            background: rgba(30,30,50,0.8);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #ffd700;
        }
        .row-title {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .row-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        select, input, button {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
        }
        select {
            background: #2c3e50;
            color: white;
            cursor: pointer;
        }
        input {
            background: #2c3e50;
            color: white;
            width: 90px;
        }
        .fight-section {
            text-align: center;
            margin: 25px 0;
        }
        .fight-btn {
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 10px;
        }
        .fight-btn:hover {
            transform: scale(1.02);
        }
        .reset-btn {
            background: #2c3e50;
            color: white;
            padding: 6px 18px;
            cursor: pointer;
        }
        .report {
            background: #0a0a1a;
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
            border: 1px solid #ffd700;
        }
        .report h3 {
            color: #ffd700;
            margin-top: 0;
        }
        .report-content {
            background: #050510;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .type-carni { color: #ff6b6b; }
        .type-herbi { color: #7bed9f; }
        .type-omni { color: #ffd700; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐺 Beast Lord Kampf-Simulator ⚔️</h1>
    <div class="subtitle">Fleischfresser 🥩 | Pflanzenfresser 🌿 | Allesfresser 🍂</div>

    <div class="armies-container">
        <div class="army attacker">
            <h2>⚔️ ANGREIFER ⚔️</h2>
            <div id="attacker-rows"></div>
        </div>
        <div class="army defender">
            <h2>🛡️ VERTEIDIGER 🛡️</h2>
            <div id="defender-rows"></div>
        </div>
    </div>

    <div class="fight-section">
        <button class="fight-btn" id="fightBtn">🔥 KAMPF STARTEN 🔥</button>
        <button class="reset-btn" id="resetBtn">↺ Standard</button>
    </div>

    <div class="report">
        <h3>📜 KAMPFBERICHT</h3>
        <div class="report-content" id="report-content">
            Klicke auf "KAMPF STARTEN"
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== BESTIEN ==========
        const BEASTS = {
            hoelhenhyaene: { name: "Höhlenhyäne", type: "carni", attack: 151, defense: 63, hp: 20 },
            langhornbison: { name: "Langhornbison", type: "herbi", attack: 99, defense: 102, hp: 28 },
            gigantopithecus: { name: "Gigantopithecus", type: "omni", attack: 121, defense: 78, hp: 24 }
        };

        // ========== ALPHAS (vereinfacht aber funktional) ==========
        const ALPHAS = {
            smilodon: { name: "Smilodon", type: "carni", skillChance: 0.7, skillMulti: 2.0 },
            beutelloewe: { name: "Beutellöwe", type: "carni", skillChance: 0.6, skillMulti: 2.15 },
            hyaenodon: { name: "Hyaenodon", type: "carni", skillChance: 0.5, skillMulti: 1.8 },
            amerikanischerGepard: { name: "Gepard", type: "carni", skillChance: 0.5, skillMulti: 1.7 },
            metridiochoerus: { name: "Metridiochoerus", type: "omni", skillChance: 0.6, skillMulti: 2.0 },
            dinopithecus: { name: "Dinopithecus", type: "omni", skillChance: 0.7, skillMulti: 2.2 },
            elefantenvogel: { name: "Elefantenvogel", type: "omni", skillChance: 0.5, skillMulti: 1.8 },
            kurznasenbaer: { name: "Kurznasenbär", type: "omni", skillChance: 0.7, skillMulti: 2.5 },
            riesenSivatherium: { name: "Sivatherium", type: "herbi", skillChance: 0.5, skillMulti: 1.6 },
            meiolanja: { name: "Meiolanja", type: "herbi", skillChance: 0.6, skillMulti: 1.5 },
            mammut: { name: "Mammut", type: "herbi", skillChance: 0.5, skillMulti: 1.7 },
            megatherium: { name: "Megatherium", type: "herbi", skillChance: 0.6, skillMulti: 2.0 }
        };

        // ========== STANDARD AUFSTELLUNG ==========
        let defaultAttacker = [
            { alpha: "smilodon", beast: "hoelhenhyaene", count: 100000 },
            { alpha: "beutelloewe", beast: "hoelhenhyaene", count: 80000 },
            { alpha: "hyaenodon", beast: "hoelhenhyaene", count: 90000 }
        ];
        
        let defaultDefender = [
            { alpha: "riesenSivatherium", beast: "langhornbison", count: 120000 },
            { alpha: "mammut", beast: "langhornbison", count: 110000 },
            { alpha: "megatherium", beast: "langhornbison", count: 100000 }
        ];

        // ========== AKTUELLE AUFSTELLUNG ==========
        let attackerRows = JSON.parse(JSON.stringify(defaultAttacker));
        let defenderRows = JSON.parse(JSON.stringify(defaultDefender));
        
        let logEntries = [];

        function addLog(msg, type) {
            logEntries.push({ msg, type: type || 'info' });
            console.log(msg);
        }

        function clearLog() {
            logEntries = [];
        }

        function updateUI() {
            const container = document.getElementById('report-content');
            if (!container) return;
            
            let html = '';
            for (let entry of logEntries) {
                let color = '#ccc';
                if (entry.type === 'damage') color = '#ff8888';
                if (entry.type === 'skill') color = '#88ff88';
                if (entry.type === 'heal') color = '#8888ff';
                if (entry.type === 'round') color = '#ffcc66';
                if (entry.type === 'victory') color = '#ffaa44';
                html += `<div style="color: ${color}; margin: 2px 0;">${entry.msg}</div>`;
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // Schadensberechnung
        function calcDamage(attacker, defender, multi) {
            let dmg = (attacker.attack * (attacker.count / 100)) * multi;
            let defReduction = defender.defense / 300;
            if (defReduction > 0.6) defReduction = 0.6;
            dmg = dmg * (1 - defReduction);
            dmg = dmg * (0.8 + Math.random() * 0.4);
            return Math.max(1, Math.floor(dmg));
        }

        // Kampf-Funktion
        function startFight() {
            // Log zurücksetzen
            clearLog();
            addLog("⚔️ KAMPF BEGINNT ⚔️", "victory");
            
            // Einheiten erstellen (Kopie)
            let attacker = attackerRows.map((r, idx) => ({
                id: idx,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                attack: BEASTS[r.beast].attack,
                defense: BEASTS[r.beast].defense,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                count: r.count,
                skillChance: ALPHAS[r.alpha].skillChance,
                skillMulti: ALPHAS[r.alpha].skillMulti,
                isAlive: true
            }));
            
            let defender = defenderRows.map((r, idx) => ({
                id: idx,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                attack: BEASTS[r.beast].attack,
                defense: BEASTS[r.beast].defense,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                count: r.count,
                skillChance: ALPHAS[r.alpha].skillChance,
                skillMulti: ALPHAS[r.alpha].skillMulti,
                isAlive: true
            }));
            
            addLog(`Angreifer: ${attacker.reduce((s,u) => s + u.count, 0).toLocaleString()} Bestien`);
            addLog(`Verteidiger: ${defender.reduce((s,u) => s + u.count, 0).toLocaleString()} Bestien`);
            
            let round = 1;
            let maxRounds = 20;
            let winner = null;
            
            while (round <= maxRounds && winner === null) {
                addLog(`\n━━━━━━ RUNDE ${round} ━━━━━━`, "round");
                
                // Typ-Vorteil berechnen
                function getTypeBonus(att, def) {
                    if (att === 'carni' && def === 'herbi') return 1.25;
                    if (att === 'herbi' && def === 'omni') return 1.25;
                    if (att === 'omni' && def === 'carni') return 1.25;
                    return 1.0;
                }
                
                // Angreifer greifen an
                for (let a of attacker) {
                    if (!a.isAlive) continue;
                    
                    let target = defender.find(d => d.isAlive);
                    if (!target) break;
                    
                    let typeBonus = getTypeBonus(a.alphaType, target.alphaType);
                    let isSkill = Math.random() < a.skillChance;
                    let multi = isSkill ? a.skillMulti * typeBonus : 1.0 * typeBonus;
                    let damage = calcDamage(a, target, multi);
                    
                    target.hp -= damage;
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        target.hp = 0;
                        addLog(`💀 ${a.alphaName} (${a.beastName}) besiegt ${target.alphaName} (${target.beastName}) mit ${damage.toLocaleString()} Schaden!`, "damage");
                    } else {
                        if (isSkill) {
                            addLog(`✨ ${a.alphaName} nutzt Spezialfähigkeit: ${damage.toLocaleString()} Schaden auf ${target.alphaName}`, "skill");
                        } else {
                            addLog(`⚔️ ${a.alphaName} (${a.beastName}) trifft für ${damage.toLocaleString()} Schaden`, "damage");
                        }
                    }
                }
                
                // Tote Verteidiger entfernen (für die Anzeige)
                let deadDef = defender.filter(d => !d.isAlive).length;
                if (deadDef > 0) {
                    addLog(`💀 ${deadDef} Verteidiger-Reihe(n) besiegt!`, "damage");
                }
                
                // Sieg prüfen
                if (!defender.some(d => d.isAlive)) {
                    winner = "ANGREIFER";
                    break;
                }
                
                // Verteidiger greifen an
                for (let d of defender) {
                    if (!d.isAlive) continue;
                    
                    let target = attacker.find(a => a.isAlive);
                    if (!target) break;
                    
                    let typeBonus = getTypeBonus(d.alphaType, target.alphaType);
                    let isSkill = Math.random() < d.skillChance;
                    let multi = isSkill ? d.skillMulti * typeBonus : 1.0 * typeBonus;
                    let damage = calcDamage(d, target, multi);
                    
                    target.hp -= damage;
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        target.hp = 0;
                        addLog(`💀 ${d.alphaName} (${d.beastName}) besiegt ${target.alphaName} (${target.beastName}) mit ${damage.toLocaleString()} Schaden!`, "damage");
                    } else {
                        if (isSkill) {
                            addLog(`✨ ${d.alphaName} nutzt Spezialfähigkeit: ${damage.toLocaleString()} Schaden auf ${target.alphaName}`, "skill");
                        } else {
                            addLog(`⚔️ ${d.alphaName} (${d.beastName}) trifft für ${damage.toLocaleString()} Schaden`, "damage");
                        }
                    }
                }
                
                // Tote Angreifer entfernen
                let deadAtt = attacker.filter(a => !a.isAlive).length;
                if (deadAtt > 0) {
                    addLog(`💀 ${deadAtt} Angreifer-Reihe(n) besiegt!`, "damage");
                }
                
                // Sieg prüfen
                if (!attacker.some(a => a.isAlive)) {
                    winner = "VERTEIDIGER";
                    break;
                }
                
                round++;
            }
            
            if (winner === null) {
                addLog(`⏰ UNENTSCHIEDEN nach ${maxRounds} Runden!`, "victory");
            } else {
                addLog(`\n🏆 SIEG: ${winner} hat gewonnen in Runde ${round}! 🏆`, "victory");
            }
            
            updateUI();
        }
        
        // ========== UI RENDER FUNKTION ==========
        function renderArmy(containerId, rows, isAttacker) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            rows.forEach((row, idx) => {
                const alpha = ALPHAS[row.alpha];
                const beast = BEASTS[row.beast];
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.innerHTML = `
                    <div class="row-title">Reihe ${idx + 1} - ${alpha.name}</div>
                    <div class="row-controls">
                        <select class="alpha-select" data-side="${isAttacker ? 'attacker' : 'defender'}" data-row="${idx}">
                            ${Object.keys(ALPHAS).map(key => `<option value="${key}" ${row.alpha === key ? 'selected' : ''}>${ALPHAS[key].name}</option>`).join('')}
                        </select>
                        <select class="beast-select" data-side="${isAttacker ? 'attacker' : 'defender'}" data-row="${idx}">
                            ${Object.keys(BEASTS).map(key => `<option value="${key}" ${row.beast === key ? 'selected' : ''}>${BEASTS[key].name}</option>`).join('')}
                        </select>
                        <input type="number" class="count-input" data-side="${isAttacker ? 'attacker' : 'defender'}" data-row="${idx}" value="${row.count}" step="1000" min="0">
                    </div>
                `;
                container.appendChild(rowDiv);
            });
        }
        
        function renderAll() {
            renderArmy('attacker-rows', attackerRows, true);
            renderArmy('defender-rows', defenderRows, false);
            attachEvents();
        }
        
        function attachEvents() {
            // Alpha Select
            document.querySelectorAll('.alpha-select').forEach(select => {
                select.onchange = (e) => {
                    const side = e.target.dataset.side;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (side === 'attacker') attackerRows[row].alpha = val;
                    else defenderRows[row].alpha = val;
                };
            });
            
            // Beast Select
            document.querySelectorAll('.beast-select').forEach(select => {
                select.onchange = (e) => {
                    const side = e.target.dataset.side;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (side === 'attacker') attackerRows[row].beast = val;
                    else defenderRows[row].beast = val;
                };
            });
            
            // Count Input
            document.querySelectorAll('.count-input').forEach(input => {
                input.onchange = (e) => {
                    const side = e.target.dataset.side;
                    const row = parseInt(e.target.dataset.row);
                    const val = parseInt(e.target.value) || 0;
                    if (side === 'attacker') attackerRows[row].count = val;
                    else defenderRows[row].count = val;
                };
            });
        }
        
        function resetSetup() {
            attackerRows = JSON.parse(JSON.stringify(defaultAttacker));
            defenderRows = JSON.parse(JSON.stringify(defaultDefender));
            renderAll();
            clearLog();
            addLog("🔁 Aufstellung zurückgesetzt");
            updateUI();
        }
        
        // Event Listener für Buttons
        document.getElementById('fightBtn').onclick = () => {
            startFight();
        };
        
        document.getElementById('resetBtn').onclick = () => {
            resetSetup();
        };
        
        // Initial render
        renderAll();
        addLog("Bereit! Klicke auf 'KAMPF STARTEN'");
        updateUI();
    })();
</script>
</body>
</html>
