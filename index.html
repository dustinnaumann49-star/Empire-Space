<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGame - Expeditionsflotte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 100, 200, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(100, 0, 200, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(200, 150, 0, 0.1) 0%, transparent 50%);
            position: relative;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            background: linear-gradient(180deg, rgba(10, 20, 40, 0.9) 0%, rgba(10, 20, 40, 0.7) 100%);
            border-bottom: 2px solid rgba(0, 150, 255, 0.3);
            margin-bottom: 30px;
            border-radius: 0 0 20px 20px;
            position: relative;
        }

        .save-indicator {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 0.85em;
            color: #44ff44;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .save-indicator.visible {
            opacity: 1;
        }

        .offline-indicator {
            position: absolute;
            top: 50px;
            right: 30px;
            font-size: 0.8em;
            color: #ffaa00;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .offline-indicator.visible {
            opacity: 1;
        }

        .reset-btn {
            position: absolute;
            top: 20px;
            left: 30px;
            background: rgba(255, 50, 50, 0.3);
            border: 1px solid rgba(255, 50, 50, 0.5);
            color: #ff6666;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: rgba(255, 50, 50, 0.5);
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3);
        }

        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 150px;
            background: rgba(100, 100, 255, 0.3);
            border: 1px solid rgba(100, 100, 255, 0.5);
            color: #aaaaff;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            background: rgba(100, 100, 255, 0.5);
            box-shadow: 0 0 15px rgba(100, 100, 255, 0.3);
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #00b4ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 100, 255, 0.5);
            letter-spacing: 3px;
        }

        .subtitle {
            color: #6699cc;
            font-size: 1.1em;
            letter-spacing: 5px;
            margin-top: 5px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .panel {
            background: linear-gradient(135deg, rgba(15, 25, 45, 0.95), rgba(20, 30, 50, 0.9));
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(0, 150, 255, 0.6);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 100, 255, 0.1);
        }

        .panel-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #00b4ff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(0, 180, 255, 0.3);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .resource-item {
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .resource-item.metal {
            border-color: rgba(180, 150, 100, 0.5);
        }
        .resource-item.crystal {
            border-color: rgba(100, 200, 180, 0.5);
        }
        .resource-item.deuterium {
            border-color: rgba(150, 150, 255, 0.5);
        }

        .resource-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .resource-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .resource-label {
            font-size: 0.8em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ship-build-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .ship-card {
            background: rgba(0, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .ship-card:hover {
            border-color: rgba(0, 150, 255, 0.6);
            background: rgba(0, 30, 60, 0.8);
            box-shadow: 0 5px 20px rgba(0, 100, 200, 0.2);
        }

        .ship-card.building {
            border-color: rgba(255, 200, 0, 0.6);
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 200, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 25px rgba(255, 200, 0, 0.6);
            }
        }

        .ship-icon-large {
            font-size: 2em;
            min-width: 50px;
            text-align: center;
        }

        .ship-info {
            flex: 1;
            min-width: 0;
        }

        .ship-name {
            font-weight: bold;
            color: #ddd;
            font-size: 0.95em;
            margin-bottom: 3px;
        }

        .ship-stats {
            font-size: 0.7em;
            color: #999;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 3px;
        }

        .ship-cost {
            font-size: 0.7em;
            color: #aaa;
        }

        .ship-build-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 180px;
        }

        .build-input {
            width: 60px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px;
            border-radius: 5px;
            text-align: center;
            font-size: 0.85em;
        }

        .build-btn {
            background: linear-gradient(135deg, #0066cc, #0044aa);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .build-btn:hover {
            background: linear-gradient(135deg, #0088ff, #0055cc);
            box-shadow: 0 5px 15px rgba(0, 100, 200, 0.4);
            transform: translateY(-2px);
        }

        .build-btn:active {
            transform: scale(0.95);
        }

        .build-btn:disabled {
            background: #333;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .count-badge {
            background: rgba(0, 150, 255, 0.8);
            color: white;
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 0.75em;
            font-weight: bold;
            display: inline-block;
        }

        .building-progress {
            font-size: 0.7em;
            color: #ffaa00;
            margin-top: 2px;
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .upgrade-item {
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .upgrade-info {
            flex: 1;
        }

        .upgrade-name {
            font-weight: bold;
            color: #ddd;
            font-size: 0.9em;
        }

        .upgrade-level {
            font-size: 0.8em;
            color: #ffaa00;
        }

        .upgrade-cost {
            font-size: 0.7em;
            color: #aaa;
        }

        .upgrade-btn {
            background: linear-gradient(135deg, #009944, #006633);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .upgrade-btn:hover {
            background: linear-gradient(135deg, #00bb55, #008844);
            box-shadow: 0 5px 15px rgba(0, 150, 50, 0.4);
        }

        .upgrade-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .fleet-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .fleet-slot {
            background: rgba(0, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .fleet-slot.active {
            border: 2px solid #ffaa00;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
            }
        }

        .fleet-slot-title {
            font-weight: bold;
            color: #00b4ff;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .ship-selector-mini {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .ship-select-item-mini {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
            font-size: 0.8em;
        }

        .ship-select-item-mini input {
            width: 50px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 4px;
            border-radius: 5px;
            text-align: center;
            font-size: 0.8em;
        }

        .fleet-timer {
            text-align: center;
            font-size: 0.85em;
            color: #ffaa00;
            margin: 8px 0;
            min-height: 20px;
        }

        .btn-small {
            background: linear-gradient(135deg, #0066cc, #0044aa);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-small:hover {
            background: linear-gradient(135deg, #0088ff, #0055cc);
            box-shadow: 0 5px 15px rgba(0, 100, 200, 0.4);
        }

        .btn-small:disabled {
            background: #333;
            cursor: not-allowed;
            box-shadow: none;
        }

        .build-queue {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 170, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 170, 0, 0.3);
            display: none;
        }

        .build-queue.active {
            display: block;
        }

        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 0.8em;
            color: #ffaa00;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.85em;
        }

        .stat-item {
            background: rgba(0, 20, 40, 0.6);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-weight: bold;
            color: #00b4ff;
            font-size: 1.2em;
        }

        .stat-label {
            font-size: 0.7em;
            color: #999;
            text-transform: uppercase;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.8em;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .history-item .gain {
            color: #44ff44;
        }
        .history-item .loss {
            color: #ff4444;
        }
        .history-item .info {
            color: #ffaa00;
        }
        .history-item .pirate {
            color: #ff8800;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 1200px) {
            .fleet-slots {
                grid-template-columns: 1fr;
            }
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <header>
            <button class="reset-btn" onclick="resetGame()" title="Spiel zurücksetzen">🔄 Reset</button>
            <button class="sound-toggle" onclick="toggleSound()" title="Sound ein/aus">🔊 Sound</button>
            <div class="save-indicator" id="saveIndicator">💾 Gespeichert</div>
            <div class="offline-indicator" id="offlineIndicator"></div>
            <h1>🚀 OGame Expedition</h1>
            <div class="subtitle">Deep Space Exploration Fleet</div>
        </header>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-title">💎 Ressourcen</div>
                <div class="resource-grid">
                    <div class="resource-item metal">
                        <div class="resource-icon">🟤</div>
                        <div class="resource-value" id="metal">5.000.000</div>
                        <div class="resource-label">Metall</div>
                    </div>
                    <div class="resource-item crystal">
                        <div class="resource-icon">🟢</div>
                        <div class="resource-value" id="crystal">2.500.000</div>
                        <div class="resource-label">Kristall</div>
                    </div>
                    <div class="resource-item deuterium">
                        <div class="resource-icon">🟣</div>
                        <div class="resource-value" id="deuterium">1.000.000</div>
                        <div class="resource-label">Deuterium</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">⬆️ Upgrades</div>
                <div class="upgrade-grid" id="upgradeGrid"></div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-title">🔧 Schiffe bauen</div>
                <div class="ship-build-grid" id="shipBuildGrid"></div>
                <div class="build-queue" id="buildQueue">
                    <strong style="color:#ffaa00;">⏳ Bauaufträge:</strong>
                    <div id="queueItems"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">📊 Statistiken</div>
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </div>

        <div class="panel full-width" style="margin-bottom: 25px;">
            <div class="panel-title">🌌 Expeditionsflotten (3 Slots)</div>
            <div class="fleet-slots" id="fleetSlots"></div>
        </div>

        <div class="panel full-width">
            <div class="panel-title">📋 Expeditions-Historie</div>
            <div class="history-list" id="historyList">
                <div style="text-align:center;color:#666;">Noch keine Expeditionen durchgeführt</div>
            </div>
        </div>
    </div>

    <script>
        // Sound Engine
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(frequency, duration, type = 'sine', volume = 0.3) {
            if (!soundEnabled) return;
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function playBuildSound() { playSound(800, 0.2, 'square', 0.1); }

        function playExpeditionStartSound() {
            playSound(300, 0.5, 'sine', 0.2);
            setTimeout(() => playSound(500, 0.3, 'sine', 0.2), 200);
            setTimeout(() => playSound(800, 0.4, 'sine', 0.2), 400);
        }

        function playExpeditionCompleteSound() {
            playSound(600, 0.3, 'triangle', 0.3);
            setTimeout(() => playSound(900, 0.3, 'triangle', 0.3), 150);
            setTimeout(() => playSound(1200, 0.5, 'triangle', 0.3), 300);
        }

        function playCombatSound() {
            playSound(100, 0.4, 'sawtooth', 0.15);
            setTimeout(() => playSound(80, 0.3, 'sawtooth', 0.15), 200);
            setTimeout(() => playSound(120, 0.2, 'sawtooth', 0.15), 400);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.querySelector('.sound-toggle').textContent = soundEnabled ? '🔊 Sound' : '🔇 Stumm';
            saveGameState();
        }

        // Piraten-Schiffstypen für detaillierte Berichte
        const pirateShipTypes = [
            { name: 'Piraten-Jäger', icon: '☠️✈️', baseCost: 8000 },
            { name: 'Piraten-Fregatte', icon: '☠️🚢', baseCost: 30000 },
            { name: 'Piraten-Kreuzer', icon: '☠️🛡️', baseCost: 80000 },
            { name: 'Piraten-Zerstörer', icon: '☠️💥', baseCost: 150000 }
        ];

        const DEFAULT_STATE = {
            resources: { metal: 5000000, crystal: 2500000, deuterium: 1000000 },
            ships: {
                großerTransporter: { count: 0 },
                schlachtkreuzer: { count: 0 },
                zerstörer: { count: 0 },
                schwererJäger: { count: 0 }
            },
            upgrades: { weapons: 0, shields: 0, armor: 0 },
            buildQueue: [],
            expeditions: [
                { active: false, startTime: null, returnTime: null, phase: null, selectedShips: { großerTransporter: 0,
                        schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 } },
                { active: false, startTime: null, returnTime: null, phase: null, selectedShips: { großerTransporter: 0,
                        schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 } },
                { active: false, startTime: null, returnTime: null, phase: null, selectedShips: { großerTransporter: 0,
                        schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 } }
            ],
            stats: {
                totalExpeditions: 0,
                totalMetalFound: 0,
                totalCrystalFound: 0,
                totalDeuteriumFound: 0,
                totalShipsBuilt: 0,
                totalShipsLost: 0,
                totalPirateShipsDestroyed: 0,
                totalCombats: 0
            },
            history: [],
            lastSaveTime: Date.now()
        };

        let state = loadGameState();

        function loadGameState() {
            try {
                const saved = localStorage.getItem('ogameExpeditionState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    soundEnabled = parsed.soundEnabled !== undefined ? parsed.soundEnabled : true;
                    const loaded = deepMerge(DEFAULT_STATE, parsed);
                    if (!loaded.stats.totalPirateShipsDestroyed) loaded.stats.totalPirateShipsDestroyed = 0;
                    return loaded;
                }
            } catch (e) {
                console.error('Fehler beim Laden:', e);
            }
            return JSON.parse(JSON.stringify(DEFAULT_STATE));
        }

        function deepMerge(target, source) {
            const output = { ...target };
            for (const key in source) {
                if (source[key] instanceof Object && !Array.isArray(source[key])) {
                    output[key] = deepMerge(target[key] || {}, source[key]);
                } else {
                    output[key] = source[key];
                }
            }
            return output;
        }

        function saveGameState() {
            try {
                state.lastSaveTime = Date.now();
                const saveData = JSON.parse(JSON.stringify(state));
                saveData.soundEnabled = soundEnabled;
                localStorage.setItem('ogameExpeditionState', JSON.stringify(saveData));
                showSaveIndicator();
            } catch (e) {
                console.error('Fehler beim Speichern:', e);
            }
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('visible');
            setTimeout(() => indicator.classList.remove('visible'), 2000);
        }

        function resetGame() {
            if (confirm('Möchtest du wirklich das gesamte Spiel zurücksetzen? Alle Fortschritte gehen verloren!')) {
                localStorage.removeItem('ogameExpeditionState');
                state = JSON.parse(JSON.stringify(DEFAULT_STATE));
                updateDisplay();
            }
        }

        const shipDefinitions = {
            großerTransporter: {
                name: 'Großer Transporter',
                icon: '🚛',
                capacity: 250000,
                baseWeapons: 50,
                baseShields: 100,
                baseArmor: 200,
                cost: { metal: 60000, crystal: 30000, deuterium: 15000 },
                buildTime: 5
            },
            schlachtkreuzer: {
                name: 'Schlachtkreuzer',
                icon: '🛡️',
                capacity: 0,
                baseWeapons: 700,
                baseShields: 400,
                baseArmor: 700,
                cost: { metal: 30000, crystal: 40000, deuterium: 15000 },
                buildTime: 60
            },
            zerstörer: {
                name: 'Zerstörer',
                icon: '💥',
                capacity: 0,
                baseWeapons: 1000,
                baseShields: 500,
                baseArmor: 1000,
                cost: { metal: 60000, crystal: 50000, deuterium: 15000 },
                buildTime: 120
            },
            schwererJäger: {
                name: 'Schwerer Jäger',
                icon: '✈️',
                capacity: 0,
                baseWeapons: 150,
                baseShields: 75,
                baseArmor: 100,
                cost: { metal: 10000, crystal: 6000, deuterium: 2000 },
                buildTime: 10
            }
        };

        function getUpgradedStats(shipType) {
            const def = shipDefinitions[shipType];
            const weaponBonus = 1 + (state.upgrades.weapons * 0.1);
            const shieldBonus = 1 + (state.upgrades.shields * 0.1);
            const armorBonus = 1 + (state.upgrades.armor * 0.1);
            return {
                weapons: Math.floor(def.baseWeapons * weaponBonus),
                shields: Math.floor(def.baseShields * shieldBonus),
                armor: Math.floor(def.baseArmor * armorBonus)
            };
        }

        function getUpgradeCost(type) {
            const level = state.upgrades[type];
            const baseCost = { metal: 500000, crystal: 250000, deuterium: 100000 };
            const multiplier = Math.pow(2, level);
            return {
                metal: Math.floor(baseCost.metal * multiplier),
                crystal: Math.floor(baseCost.crystal * multiplier),
                deuterium: Math.floor(baseCost.deuterium * multiplier)
            };
        }

        function processOfflineProgress() {
            const now = Date.now();
            const timeDiff = now - state.lastSaveTime;
            if (timeDiff < 1000) return;

            let offlineMessage = [];
            while (state.buildQueue.length > 0 && state.buildQueue[0].endTime <= now) {
                const completed = state.buildQueue.shift();
                state.ships[completed.shipType].count++;
            }

            let expeditionsCompleted = 0;
            for (let i = 0; i < state.expeditions.length; i++) {
                const exp = state.expeditions[i];
                if (exp.active && exp.returnTime && exp.returnTime <= now) {
                    completeSlotExpedition(i, true);
                    expeditionsCompleted++;
                }
            }

            if (expeditionsCompleted > 0) {
                offlineMessage.push(`🌌 ${expeditionsCompleted} Expedition(en) abgeschlossen`);
            }

            if (offlineMessage.length > 0) {
                const minutes = Math.floor(timeDiff / 60000);
                const hours = Math.floor(minutes / 60);
                const timeStr = hours > 0 ?
                    `${hours}h ${minutes % 60}min` :
                    `${minutes}min ${Math.floor((timeDiff % 60000) / 1000)}s`;
                showOfflineIndicator(`✅ ${timeStr} Offline: ${offlineMessage.join(', ')}`);
            }

            state.lastSaveTime = now;
            saveGameState();
        }

        function showOfflineIndicator(message) {
            const indicator = document.getElementById('offlineIndicator');
            indicator.textContent = message;
            indicator.classList.add('visible');
            setTimeout(() => indicator.classList.remove('visible'), 5000);
        }

        function updateDisplay(preserveInputs = false) {
            document.getElementById('metal').textContent = state.resources.metal.toLocaleString();
            document.getElementById('crystal').textContent = state.resources.crystal.toLocaleString();
            document.getElementById('deuterium').textContent = state.resources.deuterium.toLocaleString();
            renderUpgrades();
            renderShipBuildCards();
            renderFleetSlots(preserveInputs);
            renderBuildQueue();
            renderStats();
            renderHistory();
            saveGameState();
        }

        function canAffordMultiple(cost, count) {
            return state.resources.metal >= cost.metal * count &&
                state.resources.crystal >= cost.crystal * count &&
                state.resources.deuterium >= cost.deuterium * count;
        }

        function deductResources(cost, count = 1) {
            state.resources.metal -= cost.metal * count;
            state.resources.crystal -= cost.crystal * count;
            state.resources.deuterium -= cost.deuterium * count;
            updateDisplay();
        }

        function addResources(type, amount) {
            state.resources[type] += amount;
            updateDisplay();
        }

        function buildShips(shipType) {
            const input = document.getElementById(`build_${shipType}`);
            const count = parseInt(input.value) || 0;
            if (count <= 0) { alert('Bitte gib eine gültige Anzahl ein (mindestens 1)!'); return; }
            const def = shipDefinitions[shipType];
            if (state.expeditions.some(e => e.active)) {
                alert('Während Expeditionen können keine Schiffe gebaut werden!');
                return;
            }
            if (!canAffordMultiple(def.cost, count)) {
                alert('Nicht genügend Ressourcen für ' + count + ' Schiffe!');
                return;
            }
            deductResources(def.cost, count);
            state.stats.totalShipsBuilt += count;
            playBuildSound();
            const now = Date.now();
            const lastEndTime = state.buildQueue.length > 0 ?
                state.buildQueue[state.buildQueue.length - 1].endTime : now;
            for (let i = 0; i < count; i++) {
                const startTime = lastEndTime + (i * def.buildTime * 1000);
                state.buildQueue.push({
                    shipType: shipType,
                    startTime: startTime,
                    duration: def.buildTime * 1000,
                    endTime: startTime + def.buildTime * 1000                });
            }
            input.value = 1;
            updateDisplay();
            scheduleQueueCheck();
        }

        function scheduleQueueCheck() {
            if (state.buildQueue.length === 0) return;
            const now = Date.now();
            const nextEndTime = state.buildQueue[0].endTime;
            const delay = Math.max(0, nextEndTime - now);
            setTimeout(() => {
                processOfflineProgress();
                if (state.buildQueue.length > 0) {
                    const now2 = Date.now();
                    while (state.buildQueue.length > 0 && state.buildQueue[0].endTime <= now2) {
                        const completed = state.buildQueue.shift();
                        state.ships[completed.shipType].count++;
                    }
                    updateDisplay();
                    scheduleQueueCheck();
                }
            }, Math.min(delay, 1000));
        }

        function upgradeType(type) {
            const cost = getUpgradeCost(type);
            if (!canAffordMultiple(cost, 1)) {
                alert('Nicht genügend Ressourcen für das Upgrade!');
                return;
            }
            deductResources(cost, 1);
            state.upgrades[type]++;
            playBuildSound();
            updateDisplay();
        }

        function renderUpgrades() {
            const grid = document.getElementById('upgradeGrid');
            grid.innerHTML = '';
            const upgrades = [
                { type: 'weapons', icon: '⚔️', name: 'Waffen', desc: '+10% Angriff' },
                { type: 'shields', icon: '🛡️', name: 'Schilde', desc: '+10% Verteidigung' },
                { type: 'armor', icon: '❤️', name: 'Panzerung', desc: '+10% Haltbarkeit' }
            ];
            upgrades.forEach(upg => {
                const level = state.upgrades[upg.type];
                const cost = getUpgradeCost(upg.type);
                const item = document.createElement('div');
                item.className = 'upgrade-item';
                item.innerHTML = `
                    <div class="upgrade-info">
                        <div class="upgrade-name">${upg.icon} ${upg.name}</div>
                        <div class="upgrade-level">Level ${level} (${upg.desc})</div>
                        <div class="upgrade-cost">🟤${cost.metal.toLocaleString()} 🟢${cost.crystal.toLocaleString()} 🟣${cost.deuterium.toLocaleString()}</div>
                    </div>
                    <button class="upgrade-btn" onclick="upgradeType('${upg.type}')" ${!canAffordMultiple(cost, 1) ? 'disabled' : ''}>Upgrade</button>
                `;
                grid.appendChild(item);
            });
        }

        function renderShipBuildCards() {
            const grid = document.getElementById('shipBuildGrid');
            grid.innerHTML = '';
            for (const [key, def] of Object.entries(shipDefinitions)) {
                const shipState = state.ships[key];
                const stats = getUpgradedStats(key);
                const inQueue = state.buildQueue.filter(q => q.shipType === key).length;
                const isBuilding = inQueue > 0;
                const card = document.createElement('div');
                card.className = 'ship-card' + (isBuilding ? ' building' : '');
                card.innerHTML = `
                    <div class="ship-icon-large">${def.icon}</div>
                    <div class="ship-info">
                        <div class="ship-name">${def.name} <span class="count-badge">${shipState.count}</span>${isBuilding ? `<span class="building-progress"> (${inQueue} in Bau)</span>` : ''}</div>
                        <div class="ship-stats"><span>⚔️ ${stats.weapons}</span><span>🛡️ ${stats.shields}</span><span>❤️ ${stats.armor}</span>${def.capacity > 0 ? `<span>📦 ${def.capacity.toLocaleString()}</span>` : ''}<span>⏱️ ${def.buildTime}s</span></div>
                        <div class="ship-cost">🟤${def.cost.metal.toLocaleString()} 🟢${def.cost.crystal.toLocaleString()} 🟣${def.cost.deuterium.toLocaleString()}</div>
                    </div>
                    <div class="ship-build-controls">
                        <input type="number" id="build_${key}" class="build-input" min="1" max="100" value="1">
                        <button class="build-btn" onclick="buildShips('${key}')">Bauen</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderBuildQueue() {
            const queueDiv = document.getElementById('buildQueue');
            const queueItems = document.getElementById('queueItems');
            if (state.buildQueue.length === 0) { queueDiv.classList.remove('active'); return; }
            queueDiv.classList.add('active');
            const now = Date.now();
            const displayQueue = state.buildQueue.slice(0, 5);
            queueItems.innerHTML = displayQueue.map((item, index) => {
                const def = shipDefinitions[item.shipType];
                const remaining = Math.max(0, item.endTime - now);
                const seconds = Math.ceil(remaining / 1000);
                return `<div class="queue-item"><span>${index + 1}. ${def.name}</span><span>${seconds > 0 ? seconds + 's' : 'Fertig!'}</span></div>`;
            }).join('');
            if (state.buildQueue.length > 5) queueItems.innerHTML += `<div class="queue-item">... und ${state.buildQueue.length - 5} weitere</div>`;
            if (state.buildQueue.length > 0) setTimeout(() => { if (state.buildQueue.length > 0) renderBuildQueue(); }, 1000);
        }

        function saveSlotInputs() {
            const slotInputs = {};
            for (let slotIndex = 0; slotIndex < 3; slotIndex++) {
                if (!state.expeditions[slotIndex].active) {
                    slotInputs[slotIndex] = {};
                    for (const key of Object.keys(shipDefinitions)) {
                        const input = document.getElementById(`slot${slotIndex}_${key}`);
                        if (input) slotInputs[slotIndex][key] = input.value;
                    }
                }
            }
            return slotInputs;
        }

        function restoreSlotInputs(slotInputs) {
            if (!slotInputs) return;
            for (const [slotIndex, inputs] of Object.entries(slotInputs)) {
                for (const [key, value] of Object.entries(inputs)) {
                    const input = document.getElementById(`slot${slotIndex}_${key}`);
                    if (input && !state.expeditions[slotIndex].active) input.value = value;
                }
            }
        }

        function renderFleetSlots(preserveInputs = false) {
            const savedInputs = preserveInputs ? saveSlotInputs() : null;
            const slots = document.getElementById('fleetSlots');
            slots.innerHTML = '';
            state.expeditions.forEach((exp, index) => {
                const slot = document.createElement('div');
                slot.className = 'fleet-slot' + (exp.active ? ' active' : '');
                if (exp.active) {
                    const remaining = exp.returnTime - Date.now();
                    const minutes = Math.floor(Math.max(0, remaining) / 60000);
                    const seconds = Math.floor((Math.max(0, remaining) % 60000) / 1000);
                    const phaseNames = { outbound: 'Hinflug', holding: 'Expedition', return: 'Rückflug' };
                    const shipList = Object.entries(exp.selectedShips).filter(([_, c]) => c > 0).map(([k, c]) => `${c}x ${shipDefinitions[k].icon}`).join(' ');
                    slot.innerHTML = `
                        <div class="fleet-slot-title">🚀 Flotte ${index + 1} - ${phaseNames[exp.phase]}</div>
                        <div class="fleet-timer">⏳ ${minutes}:${seconds.toString().padStart(2, '0')}</div>
                        <div style="font-size:0.8em;color:#999;">${shipList || 'Keine Schiffe'}</div>
                    `;
                } else {
                    slot.innerHTML = `
                        <div class="fleet-slot-title">🚀 Flotte ${index + 1}</div>
                        <div class="ship-selector-mini" id="slotSelector${index}"></div>
                        <div class="fleet-timer">Bereit</div>
                        <button class="btn-small" onclick="startSlotExpedition(${index})">Starten</button>
                    `;
                }
                slots.appendChild(slot);
            });
            state.expeditions.forEach((exp, index) => {
                if (!exp.active) {
                    const selectorDiv = document.getElementById(`slotSelector${index}`);
                    if (selectorDiv) {
                        for (const [key, def] of Object.entries(shipDefinitions)) {
                            const shipCount = state.ships[key];
                            let availableShips = shipCount;
                            for (let i = 0; i < 3; i++) {
                                if (i !== index && !state.expeditions[i].active) {
                                    const otherInput = document.getElementById(`slot${i}_${key}`);
                                    if (otherInput) availableShips -= (parseInt(otherInput.value) || 0);
                                }
                            }
                            availableShips = Math.max(0, availableShips);
                            const item = document.createElement('div');
                            item.className = 'ship-select-item-mini';
                            item.innerHTML = `
                                <span>${def.icon} ${def.name} (${availableShips} verfügbar)</span>
                                <input type="number" id="slot${index}_${key}" min="0" max="${availableShips}" value="0" onchange="updateSlotAvailability()">
                            `;
                            selectorDiv.appendChild(item);
                        }
                    }
                }
            });
            if (preserveInputs && savedInputs) restoreSlotInputs(savedInputs);
            updateSlotAvailability();
        }

        function updateSlotAvailability() {
            const shipCounts = {};
            for (const key of Object.keys(shipDefinitions)) shipCounts[key] = state.ships[key].count;
            const selectedInSlots = {};
            for (const key of Object.keys(shipDefinitions)) selectedInSlots[key] = 0;
            for (let slotIndex = 0; slotIndex < 3; slotIndex++) {
                if (!state.expeditions[slotIndex].active) {
                    for (const key of Object.keys(shipDefinitions)) {
                        const input = document.getElementById(`slot${slotIndex}_${key}`);
                        if (input) selectedInSlots[key] += (parseInt(input.value) || 0);
                    }
                }
            }
            for (let slotIndex = 0; slotIndex < 3; slotIndex++) {
                if (!state.expeditions[slotIndex].active) {
                    for (const key of Object.keys(shipDefinitions)) {
                        const input = document.getElementById(`slot${slotIndex}_${key}`);
                        const label = input?.parentElement?.querySelector('span');
                        if (input && label) {
                            const currentValue = parseInt(input.value) || 0;
                            const usedInOtherSlots = selectedInSlots[key] - currentValue;
                            const available = Math.max(0, shipCounts[key] - usedInOtherSlots);
                            input.max = available;
                            if (currentValue > available) input.value = available;
                            label.textContent = `${shipDefinitions[key].icon} ${shipDefinitions[key].name} (${available} verfügbar)`;
                        }
                    }
                }
            }
        }

        function getSlotShips(slotIndex) {
            const selected = {};
            let total = 0;
            for (const key of Object.keys(shipDefinitions)) {
                const input = document.getElementById(`slot${slotIndex}_${key}`);
                const value = parseInt(input?.value) || 0;
                selected[key] = value;
                total += value;
            }
            return { selected, total };
        }

        function startSlotExpedition(slotIndex) {
            if (state.buildQueue.length > 0) { alert('Warte bis alle Bauaufträge abgeschlossen sind!'); return; }
            const { selected, total } = getSlotShips(slotIndex);
            if (total === 0) { alert('Wähle mindestens ein Schiff für Flotte ' + (slotIndex + 1) + '!'); return; }
            const shipUsage = {};
            for (const key of Object.keys(shipDefinitions)) shipUsage[key] = 0;
            for (let i = 0; i < 3; i++) {
                if (i !== slotIndex && state.expeditions[i].active) {
                    for (const [key, count] of Object.entries(state.expeditions[i].selectedShips)) {
                        shipUsage[key] = (shipUsage[key] || 0) + count;
                    }
                }
            }
            for (let i = 0; i < 3; i++) {
                if (i !== slotIndex && !state.expeditions[i].active) {
                    const otherShips = getSlotShips(i);
                    for (const [key, count] of Object.entries(otherShips.selected)) {
                        shipUsage[key] = (shipUsage[key] || 0) + count;
                    }
                }
            }
            for (const [key, count] of Object.entries(selected)) {
                const totalNeeded = (shipUsage[key] || 0) + count;
                if (state.ships[key].count < totalNeeded) {
                    alert(`Nicht genügend ${shipDefinitions[key].name} verfügbar! (${state.ships[key].count} vorhanden, ${totalNeeded} benötigt)`);
                    return;
                }
            }
            for (const [key, count] of Object.entries(selected)) state.ships[key].count -= count;
            const now = Date.now();
            const exp = state.expeditions[slotIndex];
            exp.active = true;
            exp.selectedShips = { ...selected };
            exp.startTime = now;
            exp.phase = 'outbound';
            exp.returnTime = now + (10 + 30 + 10) * 60 * 1000;
            playExpeditionStartSound();
            updateDisplay();
            scheduleExpeditionCheck(slotIndex);
        }

        function scheduleExpeditionCheck(slotIndex) {
            const exp = state.expeditions[slotIndex];
            if (!exp.active) return;
            const now = Date.now();
            const remaining = exp.returnTime - now;
            if (remaining <= 0) { completeSlotExpedition(slotIndex); return; }
            const elapsed = now - exp.startTime;
            if (elapsed < 10 * 60 * 1000) exp.phase = 'outbound';
            else if (elapsed < 40 * 60 * 1000) exp.phase = 'holding';
            else exp.phase = 'return';
            updateTimerDisplay(slotIndex);
            const checkDelay = Math.min(remaining, 1000);
            setTimeout(() => scheduleExpeditionCheck(slotIndex), checkDelay);
        }

        function updateTimerDisplay(slotIndex) {
            const exp = state.expeditions[slotIndex];
            if (!exp.active) return;
            const slot = document.querySelectorAll('.fleet-slot')[slotIndex];
            if (!slot) return;
            const remaining = exp.returnTime - Date.now();
            const minutes = Math.floor(Math.max(0, remaining) / 60000);
            const seconds = Math.floor((Math.max(0, remaining) % 60000) / 1000);
            const phaseNames = { outbound: 'Hinflug', holding: 'Expedition', return: 'Rückflug' };
            const shipList = Object.entries(exp.selectedShips).filter(([_, c]) => c > 0).map(([k, c]) => `${c}x ${shipDefinitions[k].icon}`).join(' ');
            const titleEl = slot.querySelector('.fleet-slot-title');
            const timerEl = slot.querySelector('.fleet-timer');
            const shipsEl = slot.querySelector('div:last-child');
            if (titleEl) titleEl.textContent = `🚀 Flotte ${slotIndex + 1} - ${phaseNames[exp.phase]}`;
            if (timerEl) timerEl.textContent = `⏳ ${minutes}:${seconds.toString().padStart(2, '0')}`;
            if (shipsEl && shipsEl.style) shipsEl.textContent = shipList || 'Keine Schiffe';
        }

        function generatePirateFleet(playerPower) {
            const pirateFleet = {};
            let remainingPower = playerPower;
            let totalPirateShips = 0;
            while (remainingPower > 1000 && totalPirateShips < 50) {
                const shipType = pirateShipTypes[Math.floor(Math.random() * pirateShipTypes.length)];
                const shipPower = shipType.baseCost;
                const maxShips = Math.floor(remainingPower / shipPower);
                const count = Math.max(1, Math.floor(Math.random() * maxShips * 0.3));
                if (count > 0) {
                    pirateFleet[shipType.name] = (pirateFleet[shipType.name] || 0) + count;
                    remainingPower -= count * shipPower;
                    totalPirateShips += count;
                } else break;
            }
            return pirateFleet;
        }

        function completeSlotExpedition(slotIndex, isOffline = false) {
            const exp = state.expeditions[slotIndex];
            const { selectedShips } = exp;
            const reportLines = [];
            let totalMetalGain = 0;
            let totalCrystalGain = 0;
            let totalDeuteriumGain = 0;
            const survivingShips = {};
            const destroyedShips = {};

            for (const [key, count] of Object.entries(selectedShips)) {
                survivingShips[key] = count;
                destroyedShips[key] = 0;
            }

            state.stats.totalExpeditions++;
            const fleetList = Object.entries(selectedShips).filter(([_, c]) => c > 0).map(([k, c]) => `${c}x ${shipDefinitions[k].icon}${shipDefinitions[k].name}`).join(', ');
            reportLines.push(`<strong>🚀 Flotte ${slotIndex + 1}:</strong> ${fleetList || 'Keine Schiffe'}`);

            // Ressourcenfund
            let foundResources = false;
            if (Math.random() < 0.5) {
                foundResources = true;
                const fundLevel = Math.random();
                let fundAmount = 0;
                let fundLabel = '';
                if (fundLevel < 0.6) { fundAmount = 1000000;
                    fundLabel = 'kleinen'; } else if (fundLevel < 0.9) { fundAmount = 5000000;
                    fundLabel = 'mittleren'; } else { fundAmount = 25000000;
                    fundLabel = 'großen'; }
                totalMetalGain += fundAmount;
                totalCrystalGain += fundAmount;
                totalDeuteriumGain += fundAmount;
                state.stats.totalMetalFound += fundAmount;
                state.stats.totalCrystalFound += fundAmount;
                state.stats.totalDeuteriumFound += fundAmount;
                reportLines.push(
                    `<span class="gain">✅ Ressourcenfund (${fundLabel}): +${fundAmount.toLocaleString()} Metall, +${fundAmount.toLocaleString()} Kristall, +${fundAmount.toLocaleString()} Deuterium</span>`);
            }

            // Piratenkampf
            let hadCombat = false;
            let pirateFleet = {};
            let pirateResourcesDestroyed = 0;

            if (Math.random() < 0.5) {
                hadCombat = true;
                state.stats.totalCombats++;
                if (!isOffline) playCombatSound();

                let playerPower = 0;
                for (const [key, count] of Object.entries(selectedShips)) {
                    const stats = getUpgradedStats(key);
                    playerPower += count * (stats.weapons + stats.shields + stats.armor);
                }

                const pirateVariation = 0.5 + Math.random();
                const pirateStrength = pirateVariation;
                const piratePower = playerPower * pirateStrength;

                // Generiere Piratenflotte
                pirateFleet = generatePirateFleet(piratePower);

                let pirateLabel = '';
                if (pirateStrength < 0.75) pirateLabel = 'schwache';
                else if (pirateStrength < 1.25) pirateLabel = 'mittlere';
                else pirateLabel = 'starke';

                const powerRatio = playerPower / (playerPower + piratePower);
                const lossRate = (1 - powerRatio) * 0.8;

                // Spieler-Verluste
                let totalOwnLossesMetal = 0;
                let totalOwnLossesCrystal = 0;
                let totalOwnLossesDeuterium = 0;

                reportLines.push(
                    `<span class="loss">⚔️ Piratenkampf (${pirateLabel} Piraten, ${Math.round(pirateStrength * 100)}% deiner Stärke)!</span>`);

                reportLines.push(`<span class="info">📋 Deine Flotte:</span> ${Object.entries(selectedShips).filter(([_, c]) => c > 0).map(([k, c]) => `${c}x ${shipDefinitions[k].icon}`).join(' ')}`);

                for (const [key, count] of Object.entries(selectedShips)) {
                    const losses = Math.floor(count * lossRate * (0.8 + Math.random() * 0.4));
                    destroyedShips[key] = losses;
                    survivingShips[key] = count - losses;
                    if (losses > 0) {
                        state.stats.totalShipsLost += losses;
                        const def = shipDefinitions[key];
                        totalOwnLossesMetal += losses * def.cost.metal;
                        totalOwnLossesCrystal += losses * def.cost.crystal;
                        totalOwnLossesDeuterium += losses * def.cost.deuterium;
                    }
                }

                const destroyedList = Object.entries(destroyedShips).filter(([_, c]) => c > 0).map(([k, c]) => `${c}x ${shipDefinitions[k].icon}${shipDefinitions[k].name}`).join(', ');
                if (destroyedList) {
                    reportLines.push(`<span class="loss">💥 Deine Verluste:</span> ${destroyedList}`);
                } else {
                    reportLines.push(`<span class="gain">✨ Keine eigenen Verluste!</span>`);
                }

                // Piraten-Verluste
                const pirateLossRate = (1 - powerRatio) * 0.7;
                const destroyedPirateFleet = {};
                let totalPirateShipsDestroyed = 0;

                reportLines.push(`<span class="pirate">☠️ Piraten-Flotte:</span> ${Object.entries(pirateFleet).map(([name, count]) => `${count}x ${name}`).join(', ')}`);

                for (const [pirateName, pirateCount] of Object.entries(pirateFleet)) {
                    const losses = Math.floor(pirateCount * pirateLossRate * (0.7 + Math.random() * 0.6));
                    if (losses > 0) {
                        destroyedPirateFleet[pirateName] = losses;
                        totalPirateShipsDestroyed += losses;
                        const pirateShip = pirateShipTypes.find(p => p.name === pirateName);
                        if (pirateShip) pirateResourcesDestroyed += losses * pirateShip.baseCost;
                    }
                }

                state.stats.totalPirateShipsDestroyed += totalPirateShipsDestroyed;

                const pirateDestroyedList = Object.entries(destroyedPirateFleet).map(([name, count]) => `${count}x ${name}`).join(', ');
                if (pirateDestroyedList) {
                    reportLines.push(`<span class="pirate">💀 Piraten-Verluste:</span> ${pirateDestroyedList} (${totalPirateShipsDestroyed} Schiffe zerstört)`);
                }

                // Bergung
                const ownRecovery = (totalOwnLossesMetal + totalOwnLossesCrystal + totalOwnLossesDeuterium) * 0.6;
                const pirateRecovery = pirateResourcesDestroyed * 0.6;
                const totalRecovery = Math.floor((ownRecovery + pirateRecovery) / 3);

                totalMetalGain += totalRecovery;
                totalCrystalGain += totalRecovery;
                totalDeuteriumGain += totalRecovery;

                reportLines.push(`<span class="gain">🔧 Bergung:</span> +${totalRecovery.toLocaleString()} je Ressource`);
                reportLines.push(
                    `<span class="info">   ↳ Eigene Schiffe: ${Math.floor(ownRecovery / 3).toLocaleString()} | Piraten: ${Math.floor(pirateRecovery / 3).toLocaleString()} (60% der Zerstörungen)</span>`);
            }

            if (!foundResources && !hadCombat) {
                reportLines.push('<span>🔭 Nichts gefunden - der Sektor war leer.</span>');
            }

            // Ressourcen gutschreiben
            state.resources.metal += totalMetalGain;
            state.resources.crystal += totalCrystalGain;
            state.resources.deuterium += totalDeuteriumGain;

            // Überlebende Schiffe zurück
            for (const [key, count] of Object.entries(survivingShips)) {
                state.ships[key].count += count;
            }

            const totalShipsLost = Object.values(destroyedShips).reduce((a, b) => a + b, 0);

            state.history.unshift({
                time: new Date().toLocaleString(),
                slot: slotIndex + 1,
                report: reportLines.join('<br>'),
                metalGain: totalMetalGain,
                crystalGain: totalCrystalGain,
                deuteriumGain: totalDeuteriumGain,
                shipsLost: totalShipsLost,
                pirateShipsDestroyed: totalPirateShipsDestroyed || 0,
                wasOffline: isOffline
            });
            if (state.history.length > 10) state.history.pop();

            exp.active = false;
            exp.selectedShips = { großerTransporter: 0, schlachtkreuzer: 0, zerstörer: 0, schwererJäger: 0 };
            exp.phase = null;
            exp.startTime = null;
            exp.returnTime = null;

            if (!isOffline) playExpeditionCompleteSound();
            updateDisplay();
        }

        function renderStats() {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = `
                <div class="stat-item"><div class="stat-value">${state.stats.totalExpeditions}</div><div class="stat-label">Expeditionen</div></div>
                <div class="stat-item"><div class="stat-value">${state.stats.totalCombats}</div><div class="stat-label">Kämpfe</div></div>
                <div class="stat-item"><div class="stat-value">${(state.stats.totalMetalFound + state.stats.totalCrystalFound + state.stats.totalDeuteriumFound).toLocaleString()}</div><div class="stat-label">Ress. gefunden</div></div>
                <div class="stat-item"><div class="stat-value">${state.stats.totalShipsBuilt}</div><div class="stat-label">Schiffe gebaut</div></div>
                <div class="stat-item"><div class="stat-value" style="color:#ff4444;">${state.stats.totalShipsLost}</div><div class="stat-label">Schiffe verloren</div></div>
                <div class="stat-item"><div class="stat-value" style="color:#ff8800;">${state.stats.totalPirateShipsDestroyed || 0}</div><div class="stat-label">Piraten zerstört</div></div>
                <div class="stat-item"><div class="stat-value">⚔️${state.upgrades.weapons} 🛡️${state.upgrades.shields} ❤️${state.upgrades.armor}</div><div class="stat-label">Upgrade-Level</div></div>
            `;
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (state.history.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#666;">Noch keine Expeditionen durchgeführt</div>';
                return;
            }
            list.innerHTML = state.history.map((entry, i) => `
                <div class="history-item">
                    <div style="color:#00b4ff;margin-bottom:5px;">${entry.time} - Flotte ${entry.slot}${entry.wasOffline ? ' <span style="color:#ffaa00;">(Offline)</span>' : ''}</div>
                    ${entry.report}
                    <div style="margin-top:5px;font-size:0.9em;">
                        <span class="gain">+${entry.metalGain.toLocaleString()} Metall</span> | 
                        <span class="gain">+${entry.crystalGain.toLocaleString()} Kristall</span> | 
                        <span class="gain">+${entry.deuteriumGain.toLocaleString()} Deuterium</span>
                        ${entry.shipsLost > 0 ? ` | <span class="loss">-${entry.shipsLost} Schiffe</span>` : ''}
                        ${entry.pirateShipsDestroyed > 0 ? ` | <span class="pirate">☠️ -${entry.pirateShipsDestroyed} Piraten</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 5 + 's');
                starsContainer.appendChild(star);
            }
        }

        // Initialisierung
        createStars();
        processOfflineProgress();
        if (state.buildQueue.length > 0) scheduleQueueCheck();
        state.expeditions.forEach((exp, index) => { if (exp.active) scheduleExpeditionCheck(index); });
        document.querySelector('.sound-toggle').textContent = soundEnabled ? '🔊 Sound' : '🔇 Stumm';
        updateDisplay();
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                processOfflineProgress();
                if (state.buildQueue.length > 0) scheduleQueueCheck();
                state.expeditions.forEach((exp, index) => { if (exp.active) scheduleExpeditionCheck(index); });
                updateDisplay();
            }
        });
        console.log('🚀 Spiel bereit mit detaillierten Kampfberichten!');
    </script>
</body>
</html>
