<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Lord Kampf-Simulator - Team vs Gegner</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        /* Battlefield Layout */
        .battlefield {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .team {
            flex: 1;
            min-width: 380px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255,215,0,0.3);
        }
        
        .team-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        
        .team-left .team-title {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: #ff6b6b;
            border-left: 4px solid #ff6b6b;
            border-right: 4px solid #ff6b6b;
        }
        
        .team-right .team-title {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: #4ecdc4;
            border-left: 4px solid #4ecdc4;
            border-right: 4px solid #4ecdc4;
        }
        
        .row-card {
            background: rgba(20,20,40,0.9);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }
        
        .team-left .row-card { border-right: 3px solid #ff6b6b; }
        .team-right .row-card { border-left: 3px solid #4ecdc4; }
        
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .row-number {
            font-size: 16px;
            font-weight: bold;
            background: #ffd700;
            color: #1a1a2e;
            padding: 2px 10px;
            border-radius: 20px;
        }
        
        .alpha-name {
            font-size: 16px;
            font-weight: bold;
        }
        
        .team-left .alpha-name { color: #ff6b6b; }
        .team-right .alpha-name { color: #4ecdc4; }
        
        .beast-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .beast-stats {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #aaa;
        }
        
        .type-carni { color: #ff6b6b; }
        .type-herbi { color: #7bed9f; }
        .type-omni { color: #ffd700; }
        
        .controls {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        
        select, input {
            padding: 5px 8px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            background: #2c3e50;
            color: white;
        }
        
        .fight-section {
            text-align: center;
            margin: 30px 0;
        }
        
        .fight-btn {
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 15px;
        }
        
        .fight-btn:hover {
            transform: scale(1.03);
        }
        
        .reset-btn {
            background: #2c3e50;
            color: white;
            padding: 8px 20px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            font-size: 14px;
        }
        
        /* KAMPFBERICHT mit 2 Spalten */
        .report {
            background: #0a0a1a;
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
            border: 1px solid #ffd700;
        }
        
        .report h3 {
            color: #ffd700;
            margin-top: 0;
            text-align: center;
        }
        
        .report-columns {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .report-column {
            flex: 1;
            min-width: 300px;
            background: #050510;
            border-radius: 10px;
            padding: 12px;
        }
        
        .report-column.left {
            border-left: 3px solid #ff6b6b;
        }
        
        .report-column.right {
            border-right: 3px solid #4ecdc4;
        }
        
        .report-column-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            padding-bottom: 8px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .report-column.left .report-column-title { color: #ff6b6b; }
        .report-column.right .report-column-title { color: #4ecdc4; }
        
        .report-content {
            font-family: monospace;
            font-size: 11px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        
        .report-line {
            margin: 2px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            padding: 0 10px;
        }
        
        @media (max-width: 1000px) {
            .battlefield, .report-columns {
                flex-direction: column;
            }
            .vs-divider {
                font-size: 24px;
                padding: 10px;
            }
        }
        
        button { cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐺 Beast Lord Kampf-Simulator ⚔️</h1>
    <div class="subtitle">Dein Team | VS | Gegner</div>

    <div class="battlefield">
        <div class="team team-left">
            <div class="team-title">⚔️ DEIN TEAM ⚔️</div>
            <div id="player-rows"></div>
        </div>
        
        <div class="vs-divider">VS</div>
        
        <div class="team team-right">
            <div class="team-title">🛡️ GEGNER 🛡️</div>
            <div id="enemy-rows"></div>
        </div>
    </div>

    <div class="fight-section">
        <button class="fight-btn" id="fightBtn">🔥 KAMPF STARTEN 🔥</button>
        <button class="reset-btn" id="resetBtn">↺ Standard</button>
    </div>

    <div class="report">
        <h3>📜 KAMPFBERICHT</h3>
        <div class="report-columns" id="report-columns">
            <div class="report-column left">
                <div class="report-column-title">⚔️ DEIN TEAM</div>
                <div class="report-content" id="player-report"></div>
            </div>
            <div class="report-column right">
                <div class="report-column-title">🛡️ GEGNER</div>
                <div class="report-content" id="enemy-report"></div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== BESTIEN ==========
        const BEASTS = {
            hoelhenhyaene: { name: "Höhlenhyäne", type: "carni", attack: 151, defense: 63, hp: 20 },
            langhornbison: { name: "Langhornbison", type: "herbi", attack: 99, defense: 102, hp: 28 },
            gigantopithecus: { name: "Gigantopithecus", type: "omni", attack: 121, defense: 78, hp: 24 }
        };

        // ========== ALPHAS ==========
        const ALPHAS = {
            smilodon: { name: "Smilodon", type: "carni", skillChance: 0.8, skillMulti: 2.0, skillName: "Tödlicher Comboschlag" },
            beutelloewe: { name: "Beutellöwe", type: "carni", skillChance: 0.6, skillMulti: 2.15, skillName: "Nachstoß" },
            hyaenodon: { name: "Hyaenodon", type: "carni", skillChance: 0.5, skillMulti: 1.8, skillName: "Erstschlag" },
            amerikanischerGepard: { name: "Gepard", type: "carni", skillChance: 0.5, skillMulti: 1.7, skillName: "Blitzangriff" },
            metridiochoerus: { name: "Metridiochoerus", type: "omni", skillChance: 0.6, skillMulti: 2.0, skillName: "Schwingenschlag" },
            dinopithecus: { name: "Dinopithecus", type: "omni", skillChance: 0.7, skillMulti: 2.2, skillName: "Echter Schaden" },
            elefantenvogel: { name: "Elefantenvogel", type: "omni", skillChance: 0.5, skillMulti: 1.8, skillName: "Reaktiver Schlag" },
            kurznasenbaer: { name: "Kurznasenbär", type: "omni", skillChance: 0.7, skillMulti: 2.5, skillName: "Ausnutzen" },
            riesenSivatherium: { name: "Sivatherium", type: "herbi", skillChance: 0.5, skillMulti: 1.6, skillName: "Verwirrender Tritt" },
            meiolanja: { name: "Meiolanja", type: "herbi", skillChance: 0.6, skillMulti: 1.5, skillName: "Gegenschlag" },
            mammut: { name: "Mammut", type: "herbi", skillChance: 0.5, skillMulti: 1.7, skillName: "Gegenangriff" },
            megatherium: { name: "Megatherium", type: "herbi", skillChance: 0.6, skillMulti: 2.0, skillName: "Fokussierter Schlag" }
        };

        // Standard Aufstellung
        let defaultPlayer = [
            { alpha: "beutelloewe", beast: "hoelhenhyaene", count: 100000 },
            { alpha: "amerikanischerGepard", beast: "hoelhenhyaene", count: 100000 },
            { alpha: "smilodon", beast: "hoelhenhyaene", count: 100000 }
        ];
        
        let defaultEnemy = [
            { alpha: "riesenSivatherium", beast: "langhornbison", count: 120000 },
            { alpha: "mammut", beast: "langhornbison", count: 110000 },
            { alpha: "megatherium", beast: "langhornbison", count: 100000 }
        ];

        let playerRows = JSON.parse(JSON.stringify(defaultPlayer));
        let enemyRows = JSON.parse(JSON.stringify(defaultEnemy));
        
        // Separate Logs für beide Teams
        let playerLog = [];
        let enemyLog = [];
        let generalLog = [];

        function addPlayerLog(msg, type) {
            playerLog.push({ msg: msg, type: type || 'info' });
        }
        
        function addEnemyLog(msg, type) {
            enemyLog.push({ msg: msg, type: type || 'info' });
        }
        
        function addGeneralLog(msg, type) {
            generalLog.push({ msg: msg, type: type || 'info' });
        }

        function clearLogs() {
            playerLog = [];
            enemyLog = [];
            generalLog = [];
        }

        function updateUI() {
            // Spieler Log
            const playerContainer = document.getElementById('player-report');
            if (playerContainer) {
                let html = '';
                for (let entry of playerLog) {
                    let color = '#ccc';
                    if (entry.type === 'damage') color = '#ff8888';
                    if (entry.type === 'skill') color = '#88ff88';
                    if (entry.type === 'heal') color = '#8888ff';
                    if (entry.type === 'round') color = '#ffcc66';
                    if (entry.type === 'victory') color = '#ffaa44';
                    if (entry.type === 'stat') color = '#ffaa88';
                    if (entry.type === 'info') color = '#aaa';
                    html += `<div class="report-line" style="color: ${color};">${escapeHtml(entry.msg)}</div>`;
                }
                playerContainer.innerHTML = html;
                playerContainer.scrollTop = playerContainer.scrollHeight;
            }
            
            // Gegner Log
            const enemyContainer = document.getElementById('enemy-report');
            if (enemyContainer) {
                let html = '';
                for (let entry of enemyLog) {
                    let color = '#ccc';
                    if (entry.type === 'damage') color = '#ff8888';
                    if (entry.type === 'skill') color = '#88ff88';
                    if (entry.type === 'heal') color = '#8888ff';
                    if (entry.type === 'round') color = '#ffcc66';
                    if (entry.type === 'victory') color = '#ffaa44';
                    if (entry.type === 'stat') color = '#ffaa88';
                    if (entry.type === 'info') color = '#aaa';
                    html += `<div class="report-line" style="color: ${color};">${escapeHtml(entry.msg)}</div>`;
                }
                enemyContainer.innerHTML = html;
                enemyContainer.scrollTop = enemyContainer.scrollHeight;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Schadensberechnung
        function calcDamage(attacker, defender, multi, isSkill = false) {
            let beastDamage = (attacker.beastAttack * (attacker.count / 100)) * multi;
            let alphaBonus = 1 + (attacker.count / 500000);
            if (alphaBonus > 1.5) alphaBonus = 1.5;
            
            let totalDamage = beastDamage * alphaBonus;
            
            let defReduction = defender.beastDefense / 400;
            if (defReduction > 0.6) defReduction = 0.6;
            totalDamage = totalDamage * (1 - defReduction);
            
            // Typ-Vorteil
            let typeBonus = 1.0;
            if (attacker.alphaType === 'carni' && defender.alphaType === 'herbi') typeBonus = 1.25;
            if (attacker.alphaType === 'herbi' && defender.alphaType === 'omni') typeBonus = 1.25;
            if (attacker.alphaType === 'omni' && defender.alphaType === 'carni') typeBonus = 1.25;
            totalDamage = totalDamage * typeBonus;
            
            totalDamage = totalDamage * (0.85 + Math.random() * 0.3);
            
            if (isSkill) totalDamage = totalDamage * 1.5;
            
            return Math.max(1, Math.floor(totalDamage));
        }

        function startFight() {
            clearLogs();
            
            addPlayerLog("═══════════════════════════════", "victory");
            addPlayerLog("⚔️ KAMPF BEGINNT ⚔️", "victory");
            addPlayerLog("═══════════════════════════════", "victory");
            
            addEnemyLog("═══════════════════════════════", "victory");
            addEnemyLog("⚔️ KAMPF BEGINNT ⚔️", "victory");
            addEnemyLog("═══════════════════════════════", "victory");
            
            // Spieler Einheiten
            let player = playerRows.map((r, idx) => ({
                id: idx,
                rowNum: idx + 1,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                alphaSkillChance: ALPHAS[r.alpha].skillChance,
                alphaSkillMulti: ALPHAS[r.alpha].skillMulti,
                alphaSkillName: ALPHAS[r.alpha].skillName,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                beastAttack: BEASTS[r.beast].attack,
                beastDefense: BEASTS[r.beast].defense,
                beastHp: BEASTS[r.beast].hp,
                beastType: BEASTS[r.beast].type,
                count: r.count,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                isAlive: true,
                totalDamage: 0,
                skillDamage: 0,
                skillUses: 0,
                kills: 0
            }));
            
            // Gegner Einheiten
            let enemy = enemyRows.map((r, idx) => ({
                id: idx,
                rowNum: idx + 1,
                alphaKey: r.alpha,
                alphaName: ALPHAS[r.alpha].name,
                alphaType: ALPHAS[r.alpha].type,
                alphaSkillChance: ALPHAS[r.alpha].skillChance,
                alphaSkillMulti: ALPHAS[r.alpha].skillMulti,
                alphaSkillName: ALPHAS[r.alpha].skillName,
                beastKey: r.beast,
                beastName: BEASTS[r.beast].name,
                beastAttack: BEASTS[r.beast].attack,
                beastDefense: BEASTS[r.beast].defense,
                beastHp: BEASTS[r.beast].hp,
                beastType: BEASTS[r.beast].type,
                count: r.count,
                maxHp: r.count * BEASTS[r.beast].hp,
                hp: r.count * BEASTS[r.beast].hp,
                isAlive: true,
                totalDamage: 0,
                skillDamage: 0,
                skillUses: 0,
                kills: 0
            }));
            
            // Aufstellung anzeigen
            addPlayerLog("\n📋 DEINE AUFSTELLUNG:", "stat");
            for (let p of player) {
                addPlayerLog(`   Reihe ${p.rowNum}: ${p.alphaName} + ${p.count.toLocaleString()} ${p.beastName}`, "stat");
            }
            
            addEnemyLog("\n📋 GEGNER AUFSTELLUNG:", "stat");
            for (let e of enemy) {
                addEnemyLog(`   Reihe ${e.rowNum}: ${e.alphaName} + ${e.count.toLocaleString()} ${e.beastName}`, "stat");
            }
            
            let round = 1;
            let maxRounds = 30;
            let winner = null;
            let playerTotalDamage = 0;
            let enemyTotalDamage = 0;
            let playerSkillDamage = 0;
            let enemySkillDamage = 0;
            let playerSkillUses = 0;
            let enemySkillUses = 0;
            
            while (round <= maxRounds && winner === null) {
                addPlayerLog(`\n╔════════════════════════╗`, "round");
                addPlayerLog(`║     RUNDE ${round}        ║`, "round");
                addPlayerLog(`╚════════════════════════╝`, "round");
                
                addEnemyLog(`\n╔════════════════════════╗`, "round");
                addEnemyLog(`║     RUNDE ${round}        ║`, "round");
                addEnemyLog(`╚════════════════════════╝`, "round");
                
                // Aktuelle Stärke
                addPlayerLog(`\n📊 AKTUELLE STÄRKE:`, "info");
                for (let p of player) {
                    let percent = p.count > 0 ? ((p.hp / p.maxHp) * 100).toFixed(0) : 0;
                    addPlayerLog(`   ${p.alphaName}: ${p.count.toLocaleString()} Bestien (${percent}% HP)`, "info");
                }
                
                addEnemyLog(`\n📊 AKTUELLE STÄRKE:`, "info");
                for (let e of enemy) {
                    let percent = e.count > 0 ? ((e.hp / e.maxHp) * 100).toFixed(0) : 0;
                    addEnemyLog(`   ${e.alphaName}: ${e.count.toLocaleString()} Bestien (${percent}% HP)`, "info");
                }
                
                // DEIN TEAM greift an
                addPlayerLog(`\n⚔️ DEIN ANGRIFF:`, "damage");
                for (let p of player) {
                    if (!p.isAlive || p.count <= 0) continue;
                    
                    let target = enemy.find(e => e.isAlive && e.count > 0);
                    if (!target) break;
                    
                    let isSkill = Math.random() < p.alphaSkillChance;
                    let multi = isSkill ? p.alphaSkillMulti : 1.0;
                    let damage = calcDamage(p, target, multi, isSkill);
                    
                    let oldCount = target.count;
                    target.hp -= damage;
                    if (target.hp < 0) target.hp = 0;
                    target.count = Math.floor(target.hp / target.beastHp);
                    
                    p.totalDamage += damage;
                    playerTotalDamage += damage;
                    
                    if (isSkill) {
                        p.skillDamage += damage;
                        p.skillUses++;
                        playerSkillDamage += damage;
                        playerSkillUses++;
                        addPlayerLog(`   ✨ ${p.alphaName}: ${p.alphaSkillName} - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (R${target.rowNum})`, "skill");
                    } else {
                        addPlayerLog(`   ⚔️ ${p.alphaName}: Normaler Angriff - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (R${target.rowNum})`, "damage");
                    }
                    
                    // Gegner Log: Schaden erhalten
                    if (isSkill) {
                        addEnemyLog(`   💥 ${target.alphaName} erleidet ${p.alphaSkillName}: ${damage.toLocaleString()} Schaden von ${p.alphaName}`, "damage");
                    } else {
                        addEnemyLog(`   💥 ${target.alphaName} erleidet normalen Angriff: ${damage.toLocaleString()} Schaden von ${p.alphaName}`, "damage");
                    }
                    
                    let lostCount = oldCount - target.count;
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        p.kills++;
                        addPlayerLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde BESIEGT!`, "damage");
                        addEnemyLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde BESIEGT!`, "damage");
                    } else if (lostCount > 0) {
                        addPlayerLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName}`, "damage");
                        addEnemyLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName} (${target.count.toLocaleString()} verbleiben)`, "damage");
                    }
                }
                
                // Sieg prüfen
                if (!enemy.some(e => e.isAlive && e.count > 0)) {
                    winner = "DEIN TEAM";
                    break;
                }
                
                // GEGNER greift an
                addEnemyLog(`\n🛡️ GEGNER ANGRIFF:`, "damage");
                for (let e of enemy) {
                    if (!e.isAlive || e.count <= 0) continue;
                    
                    let target = player.find(p => p.isAlive && p.count > 0);
                    if (!target) break;
                    
                    let isSkill = Math.random() < e.alphaSkillChance;
                    let multi = isSkill ? e.alphaSkillMulti : 1.0;
                    let damage = calcDamage(e, target, multi, isSkill);
                    
                    let oldCount = target.count;
                    target.hp -= damage;
                    if (target.hp < 0) target.hp = 0;
                    target.count = Math.floor(target.hp / target.beastHp);
                    
                    e.totalDamage += damage;
                    enemyTotalDamage += damage;
                    
                    if (isSkill) {
                        e.skillDamage += damage;
                        e.skillUses++;
                        enemySkillDamage += damage;
                        enemySkillUses++;
                        addEnemyLog(`   ✨ ${e.alphaName}: ${e.alphaSkillName} - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (R${target.rowNum})`, "skill");
                    } else {
                        addEnemyLog(`   ⚔️ ${e.alphaName}: Normaler Angriff - ${damage.toLocaleString()} Schaden auf ${target.alphaName} (R${target.rowNum})`, "damage");
                    }
                    
                    // Spieler Log: Schaden erhalten
                    if (isSkill) {
                        addPlayerLog(`   💥 ${target.alphaName} erleidet ${e.alphaSkillName}: ${damage.toLocaleString()} Schaden von ${e.alphaName}`, "damage");
                    } else {
                        addPlayerLog(`   💥 ${target.alphaName} erleidet normalen Angriff: ${damage.toLocaleString()} Schaden von ${e.alphaName}`, "damage");
                    }
                    
                    let lostCount = oldCount - target.count;
                    if (target.hp <= 0) {
                        target.isAlive = false;
                        e.kills++;
                        addEnemyLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde BESIEGT!`, "damage");
                        addPlayerLog(`   💀 ${target.alphaName} (Reihe ${target.rowNum}) wurde BESIEGT!`, "damage");
                    } else if (lostCount > 0) {
                        addEnemyLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName}`, "damage");
                        addPlayerLog(`   📉 ${target.alphaName} verliert ${lostCount.toLocaleString()} ${target.beastName} (${target.count.toLocaleString()} verbleiben)`, "damage");
                    }
                }
                
                // Sieg prüfen
                if (!player.some(p => p.isAlive && p.count > 0)) {
                    winner = "GEGNER";
                    break;
                }
                
                round++;
            }
            
            // ========== KAMPFBERICHT ==========
            addPlayerLog(`\n╔═══════════════════════════════╗`, "victory");
            addPlayerLog(`║       KAMPFBERICHT           ║`, "victory");
            addPlayerLog(`╚═══════════════════════════════╝`, "victory");
            
            addEnemyLog(`\n╔═══════════════════════════════╗`, "victory");
            addEnemyLog(`║       KAMPFBERICHT           ║`, "victory");
            addEnemyLog(`╚═══════════════════════════════╝`, "victory");
            
            if (winner === null) {
                addPlayerLog(`\n⏰ UNENTSCHIEDEN nach ${maxRounds} Runden!`, "victory");
                addEnemyLog(`\n⏰ UNENTSCHIEDEN nach ${maxRounds} Runden!`, "victory");
            } else {
                addPlayerLog(`\n🏆 SIEGER: ${winner} nach ${round} Runden! 🏆`, "victory");
                addEnemyLog(`\n🏆 SIEGER: ${winner} nach ${round} Runden! 🏆`, "victory");
            }
            
            // Statistiken
            addPlayerLog(`\n📊 STATISTIK:`, "stat");
            addPlayerLog(`   Gesamtschaden: ${playerTotalDamage.toLocaleString()}`, "stat");
            addPlayerLog(`   Skills: ${playerSkillDamage.toLocaleString()} (${playerSkillUses}×)`, "stat");
            addPlayerLog(`   Normal: ${(playerTotalDamage - playerSkillDamage).toLocaleString()}`, "stat");
            
            addEnemyLog(`\n📊 STATISTIK:`, "stat");
            addEnemyLog(`   Gesamtschaden: ${enemyTotalDamage.toLocaleString()}`, "stat");
            addEnemyLog(`   Skills: ${enemySkillDamage.toLocaleString()} (${enemySkillUses}×)`, "stat");
            addEnemyLog(`   Normal: ${(enemyTotalDamage - enemySkillDamage).toLocaleString()}`, "stat");
            
            // Details pro Reihe
            addPlayerLog(`\n📋 DETAILS PRO REIHE:`, "stat");
            for (let p of player) {
                let status = p.isAlive && p.count > 0 ? "✅ Überlebt" : "💀 Besiegt";
                addPlayerLog(`   Reihe ${p.rowNum}: ${p.alphaName}`, "stat");
                addPlayerLog(`      Schaden: ${p.totalDamage.toLocaleString()} (Skills: ${p.skillDamage.toLocaleString()}, ${p.skillUses}×)`, "stat");
                addPlayerLog(`      Kills: ${p.kills} | Status: ${status}`, "stat");
                addPlayerLog(`      Verbleibend: ${p.count.toLocaleString()} ${p.beastName}`, "stat");
            }
            
            addEnemyLog(`\n📋 DETAILS PRO REIHE:`, "stat");
            for (let e of enemy) {
                let status = e.isAlive && e.count > 0 ? "✅ Überlebt" : "💀 Besiegt";
                addEnemyLog(`   Reihe ${e.rowNum}: ${e.alphaName}`, "stat");
                addEnemyLog(`      Schaden: ${e.totalDamage.toLocaleString()} (Skills: ${e.skillDamage.toLocaleString()}, ${e.skillUses}×)`, "stat");
                addEnemyLog(`      Kills: ${e.kills} | Status: ${status}`, "stat");
                addEnemyLog(`      Verbleibend: ${e.count.toLocaleString()} ${e.beastName}`, "stat");
            }
            
            updateUI();
        }
        
        // ========== UI RENDER ==========
        function renderTeams() {
            renderTeam('player-rows', playerRows, 'player');
            renderTeam('enemy-rows', enemyRows, 'enemy');
            attachEvents();
        }
        
        function renderTeam(containerId, rows, team) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            rows.forEach((row, idx) => {
                const alpha = ALPHAS[row.alpha];
                const beast = BEASTS[row.beast];
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row-card';
                rowDiv.innerHTML = `
                    <div class="row-header">
                        <span class="row-number">Reihe ${idx + 1}</span>
                        <span class="alpha-name">${alpha.name}</span>
                    </div>
                    <div class="beast-info">
                        <span class="${beast.type === 'carni' ? 'type-carni' : beast.type === 'herbi' ? 'type-herbi' : 'type-omni'}">
                            ${beast.type === 'carni' ? '🥩' : beast.type === 'herbi' ? '🌿' : '🍂'} ${beast.name}
                        </span>
                        <span>📊 ${row.count.toLocaleString()} Bestien</span>
                    </div>
                    <div class="beast-stats">
                        <span>⚔️ ${beast.attack}</span>
                        <span>🛡️ ${beast.defense}</span>
                        <span>❤️ ${beast.hp}</span>
                    </div>
                    <div class="controls">
                        <select class="alpha-select" data-team="${team}" data-row="${idx}">
                            ${Object.keys(ALPHAS).map(key => `<option value="${key}" ${row.alpha === key ? 'selected' : ''}>${ALPHAS[key].name}</option>`).join('')}
                        </select>
                        <select class="beast-select" data-team="${team}" data-row="${idx}">
                            ${Object.keys(BEASTS).map(key => `<option value="${key}" ${row.beast === key ? 'selected' : ''}>${BEASTS[key].name}</option>`).join('')}
                        </select>
                        <input type="number" class="count-input" data-team="${team}" data-row="${idx}" value="${row.count}" step="1000" min="0" style="width: 100px;">
                    </div>
                `;
                container.appendChild(rowDiv);
            });
        }
        
        function attachEvents() {
            document.querySelectorAll('.alpha-select').forEach(select => {
                select.onchange = (e) => {
                    const team = e.target.dataset.team;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (team === 'player') playerRows[row].alpha = val;
                    else enemyRows[row].alpha = val;
                };
            });
            
            document.querySelectorAll('.beast-select').forEach(select => {
                select.onchange = (e) => {
                    const team = e.target.dataset.team;
                    const row = parseInt(e.target.dataset.row);
                    const val = e.target.value;
                    if (team === 'player') playerRows[row].beast = val;
                    else enemyRows[row].beast = val;
                };
            });
            
            document.querySelectorAll('.count-input').forEach(input => {
                input.onchange = (e) => {
                    const team = e.target.dataset.team;
                    const row = parseInt(e.target.dataset.row);
                    const val = parseInt(e.target.value) || 0;
                    if (team === 'player') playerRows[row].count = val;
                    else enemyRows[row].count = val;
                };
            });
        }
        
        function resetSetup() {
            playerRows = JSON.parse(JSON.stringify(defaultPlayer));
            enemyRows = JSON.parse(JSON.stringify(defaultEnemy));
            renderTeams();
            clearLogs();
            addPlayerLog("🔁 Aufstellung zurückgesetzt!");
            addEnemyLog("🔁 Aufstellung zurückgesetzt!");
            updateUI();
        }
        
        document.getElementById('fightBtn').onclick = () => startFight();
        document.getElementById('resetBtn').onclick = () => resetSetup();
        
        renderTeams();
        addPlayerLog("✅ Bereit! Klicke auf 'KAMPF STARTEN'");
        addEnemyLog("✅ Bereit! Klicke auf 'KAMPF STARTEN'");
        updateUI();
    })();
</script>
</body>
</html>
